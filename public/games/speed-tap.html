<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Speed Tap — Touch?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a24;--b1:rgba(255,255,255,.08);
  --t1:#f5f5f7;--t2:#8888a0;--t3:#555568;
  --ac:#ff6b35;--ac2:#ff8f65;--ok:#34d399;--err:#f87171;
}
html,body{height:100%;width:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

.g-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;border-bottom:1px solid var(--b1);flex-shrink:0}
.g-status{padding:.3rem .7rem;background:var(--s1);border-radius:16px;font-size:.7rem;color:var(--t2)}
.g-score{font-size:.85rem;font-weight:700;color:var(--ac)}

.g-board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow:hidden;position:relative}

.g-footer{display:flex;gap:.5rem;padding:.8rem 1rem;border-top:1px solid var(--b1);flex-shrink:0}
.g-btn{flex:1;padding:.7rem;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:.8rem;font-family:inherit;transition:opacity .15s,transform .1s}
.g-btn:active{opacity:.85;transform:scale(.97)}
.g-btn.primary{background:var(--ac);color:#fff}
.g-btn.secondary{background:var(--s1);color:var(--t2);border:1px solid var(--b1)}

.g-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;background:var(--s2);border:1px solid var(--b1);border-radius:12px;font-size:.75rem;color:var(--t1);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.g-toast.show{opacity:1}

/* === SPEED TAP STYLES === */
.game-area{width:100%;max-width:360px;position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}

.timer-ring{position:relative;width:200px;height:200px;margin-bottom:1rem}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring-bg{fill:none;stroke:var(--s2);stroke-width:6}
.timer-ring-fill{fill:none;stroke:var(--ac);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .3s}
.timer-ring-fill.warning{stroke:var(--err)}
.timer-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.timer-seconds{font-size:3rem;font-weight:900;font-variant-numeric:tabular-nums;line-height:1}
.timer-label{font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

.target-area{width:100%;flex:1;position:relative;max-height:400px;margin-bottom:.5rem;border-radius:16px;background:var(--s1);border:1px solid var(--b1);overflow:hidden;min-height:250px}

.target{position:absolute;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;animation:targetPop .2s ease-out;transition:transform .08s}
.target:active{transform:scale(.85)}
.target svg{width:60%;height:60%}

@keyframes targetPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes targetFade{0%{transform:scale(1);opacity:1}100%{transform:scale(.3);opacity:0}}

.tap-ripple{position:absolute;border-radius:50%;border:2px solid var(--ac);pointer-events:none;animation:ripple .5s ease-out forwards}
@keyframes ripple{0%{transform:scale(0);opacity:1}100%{transform:scale(3);opacity:0}}

.score-float{position:absolute;font-size:.9rem;font-weight:800;pointer-events:none;animation:floatUp .8s ease-out forwards;color:var(--ok)}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}

.stats-bar{display:flex;gap:.5rem;width:100%;max-width:360px;margin-bottom:.5rem}
.stat-pill{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:.3rem .5rem;text-align:center;display:flex;flex-direction:column;align-items:center}
.stat-pill-label{font-size:.5rem;color:var(--t3);text-transform:uppercase}
.stat-pill-value{font-size:.9rem;font-weight:700}

.vs-bar{display:flex;align-items:center;gap:.5rem;width:100%;max-width:360px;margin-top:.5rem}
.vs-player{flex:1;text-align:center;padding:.4rem;background:var(--s1);border:1px solid var(--b1);border-radius:8px}
.vs-player.me{border-color:var(--ac)}
.vs-name{font-size:.55rem;color:var(--t3);text-transform:uppercase}
.vs-pts{font-size:1.1rem;font-weight:800}
.vs-div{font-size:.7rem;color:var(--t3);font-weight:700}

.start-screen{text-align:center}
.start-icon{width:80px;height:80px;margin:0 auto 1rem}
.start-title{font-size:1.3rem;font-weight:800;margin-bottom:.3rem}
.start-sub{font-size:.75rem;color:var(--t2);margin-bottom:1rem;line-height:1.4}
.start-btn{padding:.9rem 2rem;border:none;border-radius:14px;background:var(--ac);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.start-btn:active{transform:scale(.97)}

.result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:2rem 1.5rem;text-align:center;max-width:300px;width:90%}
.result-title{font-size:1.4rem;font-weight:800;margin-bottom:.5rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:1rem 0}
.result-stat{background:var(--s2);border-radius:8px;padding:.6rem}
.result-stat-label{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.result-stat-value{font-size:1rem;font-weight:700;color:var(--ac)}
.result-btn{width:100%;padding:.8rem;border:none;border-radius:12px;background:var(--ac);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit;margin-top:.5rem}
.result-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="g-header">
  <div class="g-status" id="gStatus">Speed Tap</div>
  <div class="g-score" id="gScore">0 pts</div>
</div>

<div class="g-board" id="gBoard"></div>

<div class="g-footer">
  <button class="g-btn secondary" onclick="doSurrender()">Desistir</button>
  <button class="g-btn primary" onclick="doNewGame()">Novo Jogo</button>
</div>

<div class="g-toast" id="gToast"></div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stats" id="resultStats"></div>
    <button class="result-btn" onclick="doNewGame()">Jogar Novamente</button>
  </div>
</div>

<script src="/games/core/bridge.js"></script>
<script>
'use strict';

var GAME_DURATION=20;
var TARGET_COLORS=['#ff6b35','#3b82f6','#22c55e','#a855f7','#ec4899','#06b6d4','#eab308'];
var TARGET_SIZES=[48,44,40,36,32];

var G={
  score:0,moves:[],startTime:Date.now(),
  isMultiplayer:!!(typeof touchBridge!=='undefined'&&touchBridge.opponentId),
  phase:'start',gameOver:false,
  timeLeft:GAME_DURATION,timerInterval:null,
  targets:[],nextTargetId:0,
  taps:0,hits:0,misses:0,
  combo:0,maxCombo:0,
  spawnInterval:null,spawnRate:1200
};

var board=document.getElementById('gBoard');

function setStatus(t){document.getElementById('gStatus').textContent=t}
function setScore(n){G.score=n;document.getElementById('gScore').textContent=n+' pts'}
function toast(m){var t=document.getElementById('gToast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

function initGame(){
  G.score=0;G.taps=0;G.hits=0;G.misses=0;G.combo=0;G.maxCombo=0;
  G.timeLeft=GAME_DURATION;G.targets=[];G.nextTargetId=0;
  G.gameOver=false;G.spawnRate=1200;G.moves=[];G.startTime=Date.now();
  clearInterval(G.timerInterval);clearInterval(G.spawnInterval);
  setScore(0);
  document.getElementById('resultOverlay').classList.remove('show');
  if(G.phase==='start') showStart();
  else startPlaying();
}

function showStart(){
  G.phase='start';setStatus('Speed Tap');
  board.innerHTML=
    '<div class="start-screen">'+
      '<div class="start-icon"><svg viewBox="0 0 80 80" fill="none">'+
        '<circle cx="40" cy="40" r="30" stroke="#ff6b35" stroke-width="2.5" stroke-dasharray="6 4"/>'+
        '<circle cx="40" cy="40" r="18" fill="#ff6b35" opacity=".2"/>'+
        '<circle cx="40" cy="40" r="8" fill="#ff6b35"/>'+
        '<circle cx="18" cy="22" r="6" fill="#3b82f6" opacity=".6"/>'+
        '<circle cx="62" cy="55" r="5" fill="#22c55e" opacity=".6"/>'+
        '<circle cx="55" cy="18" r="4" fill="#a855f7" opacity=".6"/>'+
      '</svg></div>'+
      '<div class="start-title">Speed Tap</div>'+
      '<div class="start-sub">Toque nos alvos que aparecem na tela.<br>'+GAME_DURATION+' segundos — quanto mais rapido, mais pontos!</div>'+
      '<button class="start-btn" onclick="startPlaying()">Comecar</button>'+
    '</div>';
}

function startPlaying(){
  G.phase='playing';
  setStatus('Jogando');
  renderPlayArea();
  startTimer();
  startSpawning();
}

function renderPlayArea(){
  board.innerHTML=
    '<div class="stats-bar">'+
      '<div class="stat-pill"><div class="stat-pill-label">Acertos</div><div class="stat-pill-value" id="hitCount" style="color:var(--ok)">0</div></div>'+
      '<div class="stat-pill"><div class="stat-pill-label">Combo</div><div class="stat-pill-value" id="comboCount" style="color:var(--ac)">0x</div></div>'+
      '<div class="stat-pill"><div class="stat-pill-label">Tempo</div><div class="stat-pill-value" id="timeDisp">'+GAME_DURATION+'s</div></div>'+
    '</div>'+
    '<div class="target-area" id="targetArea"></div>';

  var area=document.getElementById('targetArea');
  area.addEventListener('click',function(e){
    if(G.gameOver) return;
    var t=e.target.closest('.target');
    if(t){
      hitTarget(parseInt(t.dataset.id),e.clientX,e.clientY);
    } else {
      G.misses++;
      G.combo=0;
      updateStats();
    }
  });
}

function startTimer(){
  G.timerInterval=setInterval(function(){
    G.timeLeft-=0.1;
    if(G.timeLeft<=0){G.timeLeft=0;endGame()}
    var td=document.getElementById('timeDisp');
    if(td) td.textContent=Math.ceil(G.timeLeft)+'s';
  },100);
}

function startSpawning(){
  spawnTarget();
  G.spawnInterval=setInterval(function(){
    spawnTarget();
    if(G.spawnRate>400) G.spawnRate-=20;
  },G.spawnRate);

  setInterval(function(){
    if(G.gameOver) return;
    clearInterval(G.spawnInterval);
    G.spawnInterval=setInterval(spawnTarget,G.spawnRate);
  },2000);
}

function spawnTarget(){
  if(G.gameOver) return;
  var area=document.getElementById('targetArea');
  if(!area) return;
  var rect=area.getBoundingClientRect();

  var sizeIdx=Math.min(Math.floor(G.hits/5),TARGET_SIZES.length-1);
  var size=TARGET_SIZES[sizeIdx];
  var color=TARGET_COLORS[Math.floor(Math.random()*TARGET_COLORS.length)];

  var maxX=rect.width-size-8;
  var maxY=rect.height-size-8;
  var x=8+Math.random()*maxX;
  var y=8+Math.random()*maxY;

  var id=G.nextTargetId++;
  var lifespan=2500-Math.min(G.hits*30,1500);

  var el=document.createElement('div');
  el.className='target';
  el.dataset.id=id;
  el.style.cssText='left:'+x+'px;top:'+y+'px;width:'+size+'px;height:'+size+'px;background:'+color;
  el.innerHTML='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.5"/><circle cx="12" cy="12" r="5" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1"/><circle cx="12" cy="12" r="1.5" fill="rgba(255,255,255,.7)"/></svg>';
  area.appendChild(el);

  G.targets.push({id:id,el:el});

  setTimeout(function(){
    if(el.parentNode){
      el.style.animation='targetFade .2s ease-out forwards';
      setTimeout(function(){if(el.parentNode)el.remove()},200);
      G.targets=G.targets.filter(function(t){return t.id!==id});
    }
  },lifespan);
}

function hitTarget(id,cx,cy){
  var target=G.targets.find(function(t){return t.id===id});
  if(!target) return;

  G.hits++;G.taps++;G.combo++;
  if(G.combo>G.maxCombo) G.maxCombo=G.combo;

  var pts=10+G.combo*2;
  G.score+=pts;
  setScore(G.score);

  G.moves.push({target:id,combo:G.combo,pts:pts,t:Date.now()});

  var area=document.getElementById('targetArea');
  var areaRect=area.getBoundingClientRect();

  var ripple=document.createElement('div');
  ripple.className='tap-ripple';
  ripple.style.cssText='left:'+(cx-areaRect.left-15)+'px;top:'+(cy-areaRect.top-15)+'px;width:30px;height:30px';
  area.appendChild(ripple);
  setTimeout(function(){ripple.remove()},500);

  if(G.combo>=3){
    var sf=document.createElement('div');
    sf.className='score-float';
    sf.textContent='+'+pts;
    sf.style.cssText='left:'+(cx-areaRect.left)+'px;top:'+(cy-areaRect.top-10)+'px';
    area.appendChild(sf);
    setTimeout(function(){sf.remove()},800);
  }

  target.el.style.animation='targetFade .15s ease-out forwards';
  setTimeout(function(){if(target.el.parentNode)target.el.remove()},150);
  G.targets=G.targets.filter(function(t){return t.id!==id});

  updateStats();
  if(G.combo===5) toast('5x Combo!');
  if(G.combo===10) toast('10x MEGA Combo!');

  if(G.isMultiplayer) touchBridge.broadcastMove({type:'hit',score:G.score,combo:G.combo});
}

function updateStats(){
  var h=document.getElementById('hitCount');
  var c=document.getElementById('comboCount');
  if(h) h.textContent=G.hits;
  if(c) c.textContent=G.combo+'x';
}

function endGame(){
  G.gameOver=true;G.phase='start';
  clearInterval(G.timerInterval);clearInterval(G.spawnInterval);

  var tps=(G.hits/GAME_DURATION).toFixed(1);
  var titleEl=document.getElementById('resultTitle');
  var statsEl=document.getElementById('resultStats');

  titleEl.textContent=G.hits>=40?'Dedos de fogo!':G.hits>=25?'Muito rapido!':G.hits>=15?'Bom ritmo!':'Mais pratica!';
  titleEl.style.color=G.hits>=40?'var(--ok)':G.hits>=25?'var(--ac)':'var(--t2)';

  statsEl.innerHTML=
    '<div class="result-stat"><div class="result-stat-label">Acertos</div><div class="result-stat-value" style="color:var(--ok)">'+G.hits+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Pontos</div><div class="result-stat-value">'+G.score+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Toques/s</div><div class="result-stat-value">'+tps+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Max Combo</div><div class="result-stat-value">'+G.maxCombo+'x</div></div>';

  document.getElementById('resultOverlay').classList.add('show');
  touchBridge.submitResult({winner:touchBridge.userId,score:G.score,duration:GAME_DURATION,moves:G.moves,surrendered:false});
}

function doSurrender(){
  if(G.gameOver||G.phase==='start') return;
  if(!confirm('Desistir?')) return;
  G.gameOver=true;clearInterval(G.timerInterval);clearInterval(G.spawnInterval);
  touchBridge.submitResult({winner:null,score:G.score,duration:Math.floor((Date.now()-G.startTime)/1000),moves:G.moves,surrendered:true});
  G.phase='start';initGame();
}

function doNewGame(){
  clearInterval(G.timerInterval);clearInterval(G.spawnInterval);
  document.getElementById('resultOverlay').classList.remove('show');
  G.phase='start';initGame();
}

if(G.isMultiplayer){
  touchBridge.onOpponentMove=function(m){};
  touchBridge.onOpponentDisconnected=function(){setStatus('Oponente saiu');toast('Oponente desconectou')};
}

window.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
