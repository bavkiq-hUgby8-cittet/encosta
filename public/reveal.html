<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Revelacao</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;width:100vw;height:100vh;height:100dvh}
#screen{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* Countdown */
#countdown{z-index:2;text-align:center}
#countdown .num{font-size:10rem;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 60px rgba(255,255,255,.5);transition:all .3s}
#countdown .sub{font-size:1rem;color:rgba(255,255,255,.7);margin-top:.5rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.1);opacity:.8}}
#countdown .num{animation:pulse .9s ease-in-out infinite}
/* Video */
#revealVideo{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;opacity:0;transition:opacity .5s}
#revealVideo.show{opacity:1}
/* Name overlay */
#nameOverlay{position:fixed;bottom:12%;left:0;right:0;text-align:center;z-index:3;opacity:0;transition:opacity .8s}
#nameOverlay.show{opacity:1}
#nameOverlay .name{font-size:2.8rem;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,255,255,.5),0 4px 20px rgba(0,0,0,.5)}
#nameOverlay .label{font-size:1.2rem;font-weight:700;color:rgba(255,255,255,.9);margin-top:.3rem}
#nameOverlay .bg{background:rgba(0,0,0,.4);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:1rem 2.5rem;border-radius:16px;display:inline-block}
/* Close */
#closeBtn{position:fixed;top:12px;right:12px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
/* Waiting */
#waiting{position:fixed;top:0;left:0;right:0;bottom:0;z-index:5;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
#waiting.hide{opacity:0;pointer-events:none}
#waiting .msg{font-size:1.2rem;color:rgba(255,255,255,.7);font-weight:600;animation:pulse 1.5s ease-in-out infinite}
</style>
</head>
<body>
<div id="screen">
  <!-- Waiting screen (shown until operator triggers reveal) -->
  <div id="waiting">
    <div class="msg">Aguardando a revelacao...</div>
  </div>

  <!-- Countdown (hidden until reveal triggered) -->
  <div id="countdown" style="display:none">
    <div class="num" id="countNum">5</div>
    <div class="sub">A revelacao vai comecar...</div>
  </div>

  <!-- Video (always in DOM, just hidden) -->
  <video id="revealVideo" playsinline webkit-playsinline muted preload="none"></video>

  <!-- Name overlay -->
  <div id="nameOverlay">
    <div class="bg">
      <div class="name" id="babyNameText"></div>
      <div class="label" id="revealLabel"></div>
    </div>
  </div>

  <button id="closeBtn" onclick="window.history.back()">X</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
// Get event ID from URL: /reveal.html?event=XXXXX
var params=new URLSearchParams(window.location.search);
var eventId=params.get('event')||params.get('e')||'';

if(!eventId){
  document.getElementById('waiting').innerHTML='<div class="msg" style="color:#ef4444">Evento nao encontrado</div>';
}

// Connect to socket
var socket=io();
if(eventId){
  socket.emit('join-event-room',eventId);
}

// Listen for reveal event
socket.on('charevela-reveal',function(data){
  if(eventId && data.eventId !== eventId) return;
  startReveal(data);
});

// Also check if already revealed (page loaded after reveal)
if(eventId){
  fetch('/api/event/'+eventId+'/charevela').then(function(r){return r.json()}).then(function(d){
    if(d.config && d.config.revealed && d.config.answer){
      // Already revealed - show result directly (no countdown, no video)
      var label = d.config.answer==='optionA' ? (d.config.optionA||'Opcao A') : (d.config.optionB||'Opcao B');
      var color = d.config.answer==='optionA' ? (d.config.colorA||'#3b82f6') : (d.config.colorB||'#ec4899');
      document.getElementById('waiting').classList.add('hide');
      var nameEl=document.getElementById('babyNameText');
      var labelEl=document.getElementById('revealLabel');
      if(d.config.babyName)nameEl.textContent=d.config.babyName;
      labelEl.textContent=label;
      labelEl.style.color=color;
      document.getElementById('nameOverlay').classList.add('show');
      document.body.style.background='radial-gradient(circle,'+color+'40,#000)';
    }
  }).catch(function(){});
}

function startReveal(data){
  var color=data.color||'#ec4899';
  var label=data.answerLabel||'???';
  var babyName=data.babyName||'';
  var videoSrc=(data.answer==='optionA')?'/reveal-boy-lite.mp4':'/reveal-girl-lite.mp4';

  // Hide waiting, show countdown
  document.getElementById('waiting').classList.add('hide');
  document.getElementById('countdown').style.display='';

  // Vibrate
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,200]);

  // Preload video
  var vid=document.getElementById('revealVideo');
  vid.src=videoSrc;
  vid.load();

  // Countdown 5..1
  var count=5;
  var numEl=document.getElementById('countNum');
  var ci=setInterval(function(){
    count--;
    numEl.textContent=count;
    if(navigator.vibrate)navigator.vibrate(count<=2?100:50);
    if(count<=3){
      numEl.style.fontSize='14rem';
      if(count<=1)numEl.style.color=color;
    }
    if(count<=0){
      clearInterval(ci);
      // Hide countdown
      document.getElementById('countdown').style.display='none';
      // Play video
      vid.classList.add('show');
      vid.muted=true;
      vid.play().then(function(){
        // Try unmute
        try{vid.muted=false}catch(e){}
      }).catch(function(e){
        console.warn('play failed:',e.message);
      });
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);

      // Show name after 7s
      setTimeout(function(){
        var nameEl=document.getElementById('babyNameText');
        var labelEl=document.getElementById('revealLabel');
        if(babyName)nameEl.textContent=babyName;
        labelEl.textContent=label;
        labelEl.style.color=color;
        document.getElementById('nameOverlay').classList.add('show');
      },7000);

      // Auto-close after video ends
      vid.onended=function(){
        // Keep showing name for 8s after video
        setTimeout(function(){window.history.back()},8000);
      };
    }
  },1000);
}
</script>
</body>
</html>
