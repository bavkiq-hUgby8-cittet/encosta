<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Touch? -- Ligar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:#08080e;color:#fff;-webkit-font-smoothing:antialiased}

/* -- Screens -- */
.screen{display:none;height:100vh;height:100dvh;width:100vw;position:fixed;top:0;left:0;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ====== SELECT SCREEN ====== */
#selectScreen{background:#08080e;padding:0 20px}

.select-top{position:absolute;top:0;left:0;right:0;padding:52px 24px 16px;display:flex;align-items:center;justify-content:space-between}
.select-title{font-size:1.5rem;font-weight:700;letter-spacing:-0.02em}
.select-title span{color:#6c5ce7}

/* userId inline */
.uid-area{display:flex;gap:8px;align-items:center}
.uid-area input{width:120px;padding:7px 12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#777;font-size:0.75rem;transition:all .3s}
.uid-area input:focus{outline:none;border-color:rgba(108,92,231,.5);color:#ccc;width:160px;background:rgba(255,255,255,.06)}

.subtitle{font-size:0.95rem;color:rgba(255,255,255,.35);font-weight:400;margin-bottom:32px;letter-spacing:-0.01em}

/* Contact cards */
.contact-list{width:100%;max-width:400px}
.contact-card{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:20px;background:rgba(255,255,255,.03);margin-bottom:10px;cursor:pointer;transition:all .25s ease;border:1px solid rgba(255,255,255,.04);position:relative;overflow:hidden}
.contact-card::before{content:'';position:absolute;inset:0;border-radius:20px;opacity:0;transition:opacity .3s}
.contact-card:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08);transform:translateY(-1px)}
.contact-card:active{transform:scale(0.98);transition:transform .1s}

.contact-card.tier-plus::before{background:linear-gradient(135deg,rgba(108,92,231,.08),transparent 60%)}
.contact-card.tier-plus:hover::before{opacity:1}
.contact-card.tier-pro::before{background:linear-gradient(135deg,rgba(243,156,18,.08),transparent 60%)}
.contact-card.tier-pro:hover::before{opacity:1}
.contact-card.tier-dev::before{background:linear-gradient(135deg,rgba(0,255,65,.06),transparent 60%)}
.contact-card.tier-dev:hover::before{opacity:1}

.contact-avatar{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;z-index:1}
.avatar-plus{background:linear-gradient(135deg,#6c5ce7,#a855f7);box-shadow:0 4px 20px rgba(108,92,231,.25)}
.avatar-pro{background:linear-gradient(135deg,#f59e0b,#f97316);box-shadow:0 4px 20px rgba(245,158,11,.25)}
.avatar-dev{background:linear-gradient(135deg,#10b981,#06d6a0);box-shadow:0 4px 20px rgba(16,185,129,.2)}

.contact-avatar svg{width:24px;height:24px;color:#fff}

.contact-info{flex:1;position:relative;z-index:1}
.contact-name{font-size:1rem;font-weight:600;margin-bottom:2px;letter-spacing:-0.01em}
.contact-desc{font-size:0.78rem;color:rgba(255,255,255,.35);line-height:1.3}

.contact-call{width:42px;height:42px;border-radius:50%;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .25s;position:relative;z-index:1}
.contact-call svg{width:18px;height:18px;color:#2ecc71}
.contact-card:hover .contact-call{background:rgba(46,204,113,.2);border-color:rgba(46,204,113,.35);transform:scale(1.05)}

/* Badge tier */
.tier-badge{font-size:0.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:5px;margin-left:6px;position:relative;top:-1px}
.badge-plus{background:rgba(108,92,231,.15);color:#a78bfa}
.badge-pro{background:rgba(245,158,11,.12);color:#fbbf24}
.badge-dev{background:rgba(16,185,129,.12);color:#34d399}

/* Pref bar */
.pref-bar{margin-top:28px;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,.3);font-size:0.8rem}
.pref-bar svg{width:16px;height:16px;opacity:.5}
.toggle-switch{position:relative;width:42px;height:24px;background:rgba(255,255,255,.08);border-radius:12px;cursor:pointer;transition:background .3s;flex-shrink:0}
.toggle-switch.on{background:rgba(108,92,231,.4)}
.toggle-switch .toggle-knob{position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;transition:left .25s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-switch.on .toggle-knob{left:21px}

/* ====== RING SCREEN ====== */
#ringScreen{background:#08080e}
.ring-wrapper{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.ring-avatar-wrap{position:relative;margin-bottom:24px}
.ring-avatar{width:96px;height:96px;border-radius:28px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2}
.ring-avatar svg{width:36px;height:36px;color:#fff}
.ring-pulse{position:absolute;inset:-12px;border-radius:34px;border:2px solid rgba(46,204,113,.2);animation:ring-expand 2s ease-out infinite;z-index:1}
.ring-pulse:nth-child(2){animation-delay:.6s}
.ring-pulse:nth-child(3){animation-delay:1.2s}
@keyframes ring-expand{0%{transform:scale(.85);opacity:.6}100%{transform:scale(1.3);opacity:0}}

.ring-text{font-size:1.3rem;font-weight:600;letter-spacing:-0.02em}
.ring-sub{font-size:0.85rem;color:rgba(255,255,255,.35);margin-bottom:40px}
.ring-dots{display:inline-flex;gap:4px;margin-left:4px}
.ring-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.35);animation:dotPulse 1.4s infinite}
.ring-dots span:nth-child(2){animation-delay:.2s}
.ring-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.3}30%{opacity:1}}

.ring-cancel{padding:14px 44px;border-radius:14px;background:rgba(239,68,68,.08);color:#ef4444;border:1px solid rgba(239,68,68,.15);font-size:0.9rem;font-weight:500;cursor:pointer;transition:all .25s;letter-spacing:-.01em}
.ring-cancel:hover{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.25)}
.ring-cancel:active{transform:scale(.96)}

/* ====== CALL SCREEN ====== */
#callScreen{background:#08080e}

.call-top{position:absolute;top:0;left:0;right:0;padding:48px 20px 0;text-align:center}
.call-tier-label{font-size:0.65rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:3px;font-weight:600;margin-bottom:10px}
.call-name{font-size:1.6rem;font-weight:700;letter-spacing:-0.03em;margin-bottom:2px}
.call-status-row{display:flex;align-items:center;justify-content:center;gap:6px}
.call-dot{width:6px;height:6px;border-radius:50%;background:#555;transition:background .3s}
.call-dot.live{background:#2ecc71;box-shadow:0 0 8px rgba(46,204,113,.4)}
.call-status{font-size:0.82rem;color:rgba(255,255,255,.4);transition:color .3s}
.call-status.active{color:rgba(255,255,255,.6)}
.call-timer{font-size:0.75rem;color:rgba(255,255,255,.2);margin-top:6px;font-variant-numeric:tabular-nums;font-weight:500}

/* Avatar central */
.call-avatar-wrap{position:relative;margin-bottom:16px}
.call-avatar{width:110px;height:110px;border-radius:32px;display:flex;align-items:center;justify-content:center;position:relative;z-index:2;transition:transform .3s}
.call-avatar svg{width:42px;height:42px;color:#fff}

/* Sound wave ring */
.sound-ring{position:absolute;inset:-6px;border-radius:36px;border:2px solid transparent;z-index:1;transition:all .3s}
.call-avatar-wrap.speaking .sound-ring{animation:soundPulse 1.2s ease-in-out infinite}
.call-avatar-wrap.speaking .sound-ring.r1{border-color:currentColor;opacity:.3}
.call-avatar-wrap.speaking .sound-ring.r2{inset:-14px;border-radius:40px;border-color:currentColor;opacity:.15;animation-delay:.2s}
.call-avatar-wrap.speaking .sound-ring.r3{inset:-22px;border-radius:44px;border-color:currentColor;opacity:.06;animation-delay:.4s}
@keyframes soundPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.06);opacity:.15}}

.color-plus{color:#a78bfa}
.color-pro{color:#fbbf24}
.color-dev{color:#34d399}

/* Transcript */
.call-transcript{position:absolute;top:55%;left:24px;right:24px;max-height:140px;overflow:hidden;text-align:center}
.t-line{font-size:0.82rem;line-height:1.5;margin-bottom:4px;opacity:0;animation:tFadeIn .3s ease forwards}
@keyframes tFadeIn{to{opacity:1}}
.t-user{color:rgba(255,255,255,.3)}
.t-agent{color:rgba(255,255,255,.55)}
.t-system{color:rgba(255,255,255,.2);font-size:0.7rem}

/* Waveform visualizer */
.waveform{position:absolute;bottom:180px;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:3px;height:32px;opacity:0;transition:opacity .3s}
.waveform.visible{opacity:1}
.wave-bar{width:3px;border-radius:2px;background:rgba(108,92,231,.4);height:8px;transition:height .1s}

/* Controls */
.call-controls{position:absolute;bottom:0;left:0;right:0;padding:20px 20px 48px;display:flex;justify-content:center;gap:20px;align-items:flex-end}
.ctrl-wrap{display:flex;flex-direction:column;align-items:center;gap:8px}
.ctrl-label{font-size:0.65rem;color:rgba(255,255,255,.25);font-weight:500}

.call-btn{width:56px;height:56px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;-webkit-tap-highlight-color:transparent}
.call-btn svg{width:22px;height:22px}
.call-btn:active{transform:scale(0.9)}

.btn-mute{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.06)}
.btn-mute:hover{background:rgba(255,255,255,.1)}
.btn-mute.muted{background:rgba(239,68,68,.1);color:#ef4444;border-color:rgba(239,68,68,.15)}

.btn-speaker{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.06)}
.btn-speaker:hover{background:rgba(255,255,255,.1)}
.btn-speaker.on{background:rgba(108,92,231,.1);color:#a78bfa;border-color:rgba(108,92,231,.2)}

.btn-hangup{width:64px;height:64px;background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 4px 24px rgba(239,68,68,.3);border:none}
.btn-hangup:hover{box-shadow:0 4px 28px rgba(239,68,68,.4)}
.btn-hangup svg{width:26px;height:26px;transform:rotate(135deg)}

/* ====== Dev Log Panel (UltimateDEV only) ====== */
.dev-log-btn{display:none;position:absolute;top:48px;right:16px;z-index:20;width:40px;height:40px;border-radius:12px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);cursor:pointer;align-items:center;justify-content:center;transition:all .25s}
.dev-log-btn.visible{display:flex}
.dev-log-btn:hover{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3)}
.dev-log-btn svg{width:18px;height:18px;color:#34d399}
.dev-log-badge{position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:#10b981;color:#fff;font-size:0.6rem;font-weight:700;display:none;align-items:center;justify-content:center;padding:0 4px}
.dev-log-badge.has-items{display:flex}

.dev-log-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .3s}
.dev-log-overlay.open{opacity:1;pointer-events:auto}

.dev-log-panel{position:fixed;top:0;right:-100%;width:min(380px,90vw);height:100vh;height:100dvh;background:#0d0d14;border-left:1px solid rgba(255,255,255,.06);z-index:100;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.dev-log-panel.open{right:0}

.dev-log-header{padding:20px 18px 14px;border-bottom:1px solid rgba(255,255,255,.05);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.dev-log-title{font-size:1rem;font-weight:600;color:#fff;display:flex;align-items:center;gap:8px}
.dev-log-title svg{width:18px;height:18px;color:#34d399}
.dev-log-close{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);transition:all .2s}
.dev-log-close:hover{background:rgba(255,255,255,.08);color:#fff}
.dev-log-close svg{width:16px;height:16px}

.dev-log-list{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.dev-log-empty{text-align:center;color:rgba(255,255,255,.2);font-size:0.85rem;padding-top:60px}

.dev-log-item{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);border-radius:14px;padding:14px 16px;transition:all .2s}
.dev-log-item:hover{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}

.dev-log-item-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dev-log-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dev-log-status.done{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}
.dev-log-status.executing,.dev-log-status.executing_git{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.3);animation:statusBlink 1.2s infinite}
.dev-log-status.planned{background:#6c5ce7;box-shadow:0 0 6px rgba(108,92,231,.3)}
.dev-log-status.failed,.dev-log-status.plan_failed{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.3)}
.dev-log-status.partial{background:#f97316;box-shadow:0 0 6px rgba(249,115,22,.3)}
.dev-log-status.planning{background:#3b82f6;box-shadow:0 0 6px rgba(59,130,246,.3);animation:statusBlink 1.2s infinite}
.dev-log-status.rejected{background:#6b7280}
@keyframes statusBlink{0%,100%{opacity:1}50%{opacity:.4}}

.dev-log-item-id{font-size:0.65rem;color:rgba(255,255,255,.2);font-family:monospace}
.dev-log-item-time{font-size:0.65rem;color:rgba(255,255,255,.2);margin-left:auto}

.dev-log-instruction{font-size:0.82rem;color:rgba(255,255,255,.7);line-height:1.45;margin-bottom:8px;word-break:break-word}

.dev-log-plan{font-size:0.72rem;color:rgba(255,255,255,.35);line-height:1.4;background:rgba(255,255,255,.02);padding:10px 12px;border-radius:10px;margin-bottom:8px;white-space:pre-wrap;max-height:120px;overflow-y:auto;display:none}
.dev-log-plan.expanded{display:block}

.dev-log-result{font-size:0.72rem;line-height:1.4;padding:8px 10px;border-radius:8px;word-break:break-word}
.dev-log-result.success{background:rgba(16,185,129,.06);color:rgba(16,185,129,.7);border:1px solid rgba(16,185,129,.1)}
.dev-log-result.error{background:rgba(239,68,68,.06);color:rgba(239,68,68,.7);border:1px solid rgba(239,68,68,.1)}
.dev-log-result.warn{background:rgba(245,158,11,.06);color:rgba(245,158,11,.7);border:1px solid rgba(245,158,11,.1)}

.dev-log-toggle{font-size:0.7rem;color:rgba(108,92,231,.6);cursor:pointer;border:none;background:none;padding:2px 0;transition:color .2s}
.dev-log-toggle:hover{color:rgba(108,92,231,.9)}

.dev-log-status-label{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.dev-log-status-label.done{color:#10b981}
.dev-log-status-label.executing,.dev-log-status-label.executing_git{color:#f59e0b}
.dev-log-status-label.planned{color:#6c5ce7}
.dev-log-status-label.failed,.dev-log-status-label.plan_failed{color:#ef4444}
.dev-log-status-label.partial{color:#f97316}
.dev-log-status-label.planning{color:#3b82f6}
.dev-log-status-label.rejected{color:#6b7280}

/* ====== Transitions ====== */
.fade-in{animation:fadeInScreen .4s ease}
@keyframes fadeInScreen{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ====== Scrollbar ====== */
::-webkit-scrollbar{display:none}

/* ====== Safe area ====== */
@supports(padding-top: env(safe-area-inset-top)){
  .select-top{padding-top:calc(env(safe-area-inset-top) + 12px)}
  .call-top{padding-top:calc(env(safe-area-inset-top) + 12px)}
  .call-controls{padding-bottom:calc(env(safe-area-inset-bottom) + 20px)}
}
</style>
</head>
<body>

<!-- ======== TELA 1: Selecionar assistente ======== -->
<div class="screen active" id="selectScreen">
  <div class="select-top">
    <div class="select-title"><span>Touch</span>?</div>
    <div class="uid-area">
      <input type="text" id="userIdInput" placeholder="userId" spellcheck="false" autocomplete="off" />
    </div>
  </div>

  <div class="subtitle">Ligar para</div>

  <div class="contact-list">
    <!-- Plus -->
    <div class="contact-card tier-plus" onclick="startCall('plus')">
      <div class="contact-avatar avatar-plus">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="contact-info">
        <div class="contact-name">Touch <span class="tier-badge badge-plus">Plus</span></div>
        <div class="contact-desc">Sua amiga fofoqueira</div>
      </div>
      <div class="contact-call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
    </div>

    <!-- Pro -->
    <div class="contact-card tier-pro" onclick="startCall('pro')">
      <div class="contact-avatar avatar-pro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </div>
      <div class="contact-info">
        <div class="contact-name">Touch <span class="tier-badge badge-pro">Pro</span></div>
        <div class="contact-desc">Fofoqueira com superpoderes</div>
      </div>
      <div class="contact-call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
    </div>

    <!-- UltimateDEV -->
    <div class="contact-card tier-dev" onclick="startCall('ultimatedev')">
      <div class="contact-avatar avatar-dev">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div class="contact-info">
        <div class="contact-name">Touch <span class="tier-badge badge-dev">Dev</span></div>
        <div class="contact-desc">Modo desenvolvedor</div>
      </div>
      <div class="contact-call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
    </div>
  </div>

  <!-- Toggle viva-voz -->
  <div class="pref-bar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    <span>Viva-voz</span>
    <div class="toggle-switch on" id="speakerToggle" onclick="toggleSpeakerPref()">
      <div class="toggle-knob"></div>
    </div>
  </div>
</div>

<!-- ======== TELA 2: Chamando... ======== -->
<div class="screen" id="ringScreen">
  <div class="ring-wrapper">
    <div class="ring-avatar-wrap">
      <div class="ring-pulse"></div>
      <div class="ring-pulse"></div>
      <div class="ring-pulse"></div>
      <div class="ring-avatar avatar-plus" id="ringAvatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:36px;height:36px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      </div>
    </div>

</div>

<!-- ======== TELA 3: Em ligacao ======== -->
<div class="screen" id="callScreen">

<!-- ======== Dev Log Button (call screen overlay, UltimateDEV only) ======== -->

<!-- ======== Dev Log Panel ======== -->
<div class="dev-log-overlay" id="devLogOverlay" onclick="closeDevLog()"></div>

  <div class="dev-log-header">
    <div class="dev-log-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v6m0 6v6m9-9h-6m-6 0H3"/></svg>
      Dev Log
    </div>
    <button class="dev-log-close" onclick="closeDevLog()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="dev-log-list" id="devLogList">
    <div class="dev-log-empty">Nenhuma alteracao ainda</div>
  </div>
</div>

<script>
// -- State --
var currentTier = 'plus';
var pc = null;
var dc = null;
var audioEl = null;
var localStream = null;
var active = false;
var muted = false;
var speakerOn = true;
var agentSpeaking = false;
var callStartTime = null;
var timerInterval = null;
var analyser = null;
var waveInterval = null;

function $(id){ return document.getElementById(id); }

// -- Waveform visualizer --
(function initWaveform(){
  var wf = $('waveform');
  for(var i=0;i<24;i++){
    var bar = document.createElement('div');
    bar.className = 'wave-bar';
    wf.appendChild(bar);
  }
})();

function startWaveform(stream){
  try{
    var ctx = new (window.AudioContext||window.webkitAudioContext)();
    var src = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();
    analyser.fftSize = 64;
    src.connect(analyser);
    var bars = $('waveform').children;
    var data = new Uint8Array(analyser.frequencyBinCount);
    $('waveform').classList.add('visible');
    waveInterval = setInterval(function(){
      if(!analyser) return;
      analyser.getByteFrequencyData(data);
      for(var i=0;i<bars.length;i++){
        var v = data[i] || 0;
        var h = Math.max(3, (v/255)*28);
        bars[i].style.height = h + 'px';
      }
    },80);
  }catch(e){}
}

function stopWaveform(){
  $('waveform').classList.remove('visible');
  if(waveInterval){clearInterval(waveInterval);waveInterval=null;}
  analyser = null;
}

// -- Speaker preference --
var SPEAKER_PREF_KEY = 'va_speaker_pref';
function loadSpeakerPref(){
  var v = localStorage.getItem(SPEAKER_PREF_KEY);
  speakerOn = v !== 'false';
  var tog = $('speakerToggle');
  if(speakerOn) tog.classList.add('on'); else tog.classList.remove('on');
}
function toggleSpeakerPref(){
  speakerOn = !speakerOn;
  localStorage.setItem(SPEAKER_PREF_KEY, speakerOn.toString());
  var tog = $('speakerToggle');
  if(speakerOn) tog.classList.add('on'); else tog.classList.remove('on');
}
loadSpeakerPref();

// -- Screens --
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active','fade-in'); });
  var el = $(id);
  el.classList.add('active','fade-in');
}

// -- Tier config --
var TIERS = {
  plus: { name:'Touch', avatarClass:'avatar-plus', tierLabel:'PLUS', colorClass:'color-plus',
    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' },
  pro: { name:'Touch Pro', avatarClass:'avatar-pro', tierLabel:'PRO', colorClass:'color-pro',
    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>' },
  ultimatedev: { name:'Touch Dev', avatarClass:'avatar-dev', tierLabel:'DEV', colorClass:'color-dev',
    icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>' }
};

// -- Start call --
function startCall(tier){
  var userId = $('userIdInput').value.trim();
  if(!userId){
    var inp = $('userIdInput');
    inp.style.borderColor='rgba(239,68,68,.5)';
    inp.focus();
    setTimeout(function(){inp.style.borderColor='';},2000);
    return;
  }
  currentTier = tier;
  var t = TIERS[tier];

  // Send timezone before connecting
  try{
    var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    if(tz)fetch('/api/user/timezone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,timezone:tz})}).catch(function(){});
  }catch(e){}

  // Ring screen
  $('ringAvatar').className = 'ring-avatar ' + t.avatarClass;
  $('ringAvatar').innerHTML = t.icon;
  $('ringName').textContent = t.name;
  showScreen('ringScreen');

  doConnect(userId, tier);
}

function cancelCall(){
  cleanup();
  showScreen('selectScreen');
}

// -- Connect --
function doConnect(userId, tier){
  var sessionUrl = tier==='ultimatedev' ? '/api/agent/ultimate-session'
    : tier==='pro' ? '/api/agent/premium-session'
    : '/api/agent/session';

  var lastInt = parseInt(localStorage.getItem('va_last_'+tier)||'0');

  fetch(sessionUrl, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ userId: userId, lastInteraction: lastInt })
  })
  .then(function(tr){
    if(!tr.ok) return tr.json().catch(function(){return {};}).then(function(e){throw new Error(e.error||'Erro '+tr.status);});
    return tr.json();
  })
  .then(function(td){
    if(!td.client_secret) throw new Error('Token nao recebido');
    localStorage.setItem('va_last_'+tier, Date.now().toString());

    pc = new RTCPeerConnection();

    audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    audioEl.volume = speakerOn ? 1.0 : 0.4;
    pc.ontrack = function(e){
      audioEl.srcObject = e.streams[0];
      startWaveform(e.streams[0]);
    };

    return navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
      localStream = stream;
      stream.getTracks().forEach(function(t){ pc.addTrack(t, stream); });

      dc = pc.createDataChannel('oai-events');
      dc.onopen = function(){
        active = true;
        enterCallScreen(tier);
        dc.send(JSON.stringify({type:'response.create'}));
      };
      dc.onmessage = function(e){
        try{ handleEvent(JSON.parse(e.data)); }catch(ex){}
      };
      dc.onclose = function(){
        if(active) handleDisconnect();
      };

      return pc.createOffer();
    }).then(function(offer){
      return pc.setLocalDescription(offer).then(function(){ return offer; });
    }).then(function(offer){
      return fetch('https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview',{
        method:'POST',
        headers:{
          'Authorization':'Bearer '+td.client_secret.value,
          'Content-Type':'application/sdp'
        },
        body: offer.sdp
      });
    }).then(function(sdpResp){
      return sdpResp.text();
    }).then(function(sdpText){
      return pc.setRemoteDescription({type:'answer',sdp:sdpText});
    });
  })
  .catch(function(err){
    alert('Erro ao conectar: '+err.message);
    cleanup();
    showScreen('selectScreen');
  });
}

// -- Enter call screen --
function enterCallScreen(tier){
  var t = TIERS[tier];
  $('callTier').textContent = t.tierLabel;
  $('callName').textContent = t.name;
  $('callStatus').textContent = 'Em ligacao';
  $('callStatus').classList.add('active');
  $('callDot').classList.add('live');
  $('callAvatar').className = 'call-avatar ' + t.avatarClass;
  $('callAvatar').innerHTML = t.icon;
  $('callAvatarWrap').className = 'call-avatar-wrap ' + t.colorClass;
  $('callTranscript').innerHTML = '';

  // Set waveform bar color
  var wfColor = tier==='pro' ? 'rgba(251,191,36,.4)' : tier==='ultimatedev' ? 'rgba(52,211,153,.4)' : 'rgba(167,139,250,.4)';
  Array.from($('waveform').children).forEach(function(b){ b.style.background = wfColor; });

  updateSpeakerUI();

  callStartTime = Date.now();
  timerInterval = setInterval(updateTimer, 1000);
  updateTimer();

  // Show dev log button for UltimateDEV
  if(tier === 'ultimatedev'){
    $('devLogBtn').classList.add('visible');
    startDevLogPolling();
  } else {
    $('devLogBtn').classList.remove('visible');
  }

  showScreen('callScreen');
}

function updateTimer(){
  if(!callStartTime) return;
  var diff = Math.floor((Date.now()-callStartTime)/1000);
  var m = String(Math.floor(diff/60)).padStart(2,'0');
  var s = String(diff%60).padStart(2,'0');
  $('callTimer').textContent = m+':'+s;
}

// -- Handle events --
function handleEvent(evt){
  var userId = $('userIdInput').value.trim();

  switch(evt.type){
    case 'conversation.item.input_audio_transcription.completed':
      if(evt.transcript){
        addCallTranscript('user', evt.transcript);
        fetch('/api/va/conversation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,tier:currentTier,role:'user',content:evt.transcript})}).catch(function(){});
        if(currentTier==='ultimatedev') fetch('/api/dev/conversation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,role:'user',content:evt.transcript})}).catch(function(){});
      }
      break;
    case 'response.audio.delta':
      agentSpeaking = true;
      $('callAvatarWrap').classList.add('speaking');
      $('callStatus').textContent = 'Falando...';
      break;
    case 'response.audio_transcript.delta':
      updateLiveAgent(evt.delta||'');
      break;
    case 'response.audio_transcript.done':
      if(evt.transcript){
        finalizeLiveAgent(evt.transcript);
        fetch('/api/va/conversation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,tier:currentTier,role:'assistant',content:evt.transcript})}).catch(function(){});
        if(currentTier==='ultimatedev') fetch('/api/dev/conversation',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:userId,role:'assistant',content:evt.transcript})}).catch(function(){});
      }
      agentSpeaking = false;
      $('callAvatarWrap').classList.remove('speaking');
      $('callStatus').textContent = 'Ouvindo...';
      break;
    case 'response.done':
      agentSpeaking = false;
      $('callAvatarWrap').classList.remove('speaking');
      $('callStatus').textContent = 'Ouvindo...';
      break;
    case 'error':
      $('callStatus').textContent = 'Erro: '+(evt.error&&evt.error.message||'');
      $('callStatus').classList.remove('active');
      $('callDot').classList.remove('live');
      break;
    case 'response.function_call_arguments.done':
      addCallTranscript('system', '['+(evt.name||'tool')+']');
      // Refresh dev log when dev tools are called
      if(currentTier==='ultimatedev' && (evt.name==='comando_dev'||evt.name==='aprovar_plano'||evt.name==='rejeitar_plano'||evt.name==='fazer_backup'||evt.name==='salvar_arquivo')){
        setTimeout(function(){ loadDevQueue(); }, 2000); // Wait a bit for server to process
        setTimeout(function(){ loadDevQueue(); }, 8000); // Check again after processing
        setTimeout(function(){ loadDevQueue(); }, 20000); // And after code gen
      }
      if(evt.call_id&&dc){
        dc.send(JSON.stringify({type:'conversation.item.create',item:{type:'function_call_output',call_id:evt.call_id,output:JSON.stringify({success:true,note:'Tool executada no modo ligacao.'})}}));
        dc.send(JSON.stringify({type:'response.create'}));
      }
      break;
  }
}

// -- Transcript --
var _liveAgentText = '';
function addCallTranscript(role, text){
  var box = $('callTranscript');
  var live = box.querySelector('.t-live');
  if(live) live.remove();
  var div = document.createElement('div');
  div.className = 't-line ' + (role==='user'?'t-user':role==='system'?'t-system':'t-agent');
  var prefix = role==='user' ? 'Voce: ' : role==='system' ? '' : TIERS[currentTier].name+': ';
  div.textContent = prefix + text;
  box.appendChild(div);
  while(box.children.length > 6) box.removeChild(box.firstChild);
  _liveAgentText = '';
}

function updateLiveAgent(delta){
  _liveAgentText += delta;
  var box = $('callTranscript');
  var live = box.querySelector('.t-live');
  if(!live){
    live = document.createElement('div');
    live.className = 't-line t-agent t-live';
    box.appendChild(live);
  }
  live.textContent = TIERS[currentTier].name+': ' + _liveAgentText;
}

function finalizeLiveAgent(full){
  var box = $('callTranscript');
  var live = box.querySelector('.t-live');
  if(live) live.remove();
  addCallTranscript('agent', full);
}

// -- Controls --
function toggleMute(){
  if(!localStream) return;
  muted = !muted;
  localStream.getAudioTracks().forEach(function(t){ t.enabled = !muted; });
  var btn = $('btnMute');
  if(muted){
    btn.classList.add('muted');
    btn.querySelector('svg').innerHTML = '<line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"/><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2c0 .41-.04.81-.1 1.2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
  } else {
    btn.classList.remove('muted');
    btn.querySelector('svg').innerHTML = '<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>';
  }
}

function toggleSpeaker(){
  if(!audioEl) return;
  speakerOn = !speakerOn;
  audioEl.volume = speakerOn ? 1.0 : 0.4;
  updateSpeakerUI();
}

function updateSpeakerUI(){
  var btn = $('btnSpeaker');
  var icon = $('speakerIcon');
  var label = $('speakerLabel');
  if(speakerOn){
    btn.classList.add('on');
    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    label.textContent = 'Viva-voz';
  } else {
    btn.classList.remove('on');
    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
    label.textContent = 'Ouvido';
  }
}

function hangUp(){
  cleanup();
  clearInterval(timerInterval);
  callStartTime = null;
  stopDevLogPolling();
  closeDevLog();
  showScreen('selectScreen');
}

function handleDisconnect(){
  active = false;
  $('callStatus').textContent = 'Ligacao encerrada';
  $('callStatus').classList.remove('active');
  $('callDot').classList.remove('live');
  $('callAvatarWrap').classList.remove('speaking');
  stopWaveform();
  stopDevLogPolling();
  clearInterval(timerInterval);
  setTimeout(function(){
    cleanup();
    closeDevLog();
    showScreen('selectScreen');
  }, 2000);
}

function cleanup(){
  active = false;
  muted = false;
  agentSpeaking = false;
  stopWaveform();
  if(dc){ try{dc.close();}catch(e){} dc=null; }
  if(pc){ try{pc.close();}catch(e){} pc=null; }
  if(localStream){ localStream.getTracks().forEach(function(t){t.stop();}); localStream=null; }
  if(audioEl){ audioEl.srcObject=null; audioEl=null; }
}

// -- Dev Log --
var devLogOpen = false;
var devLogInterval = null;
var lastDevQueueCount = 0;

function openDevLog(){
  devLogOpen = true;
  $('devLogOverlay').classList.add('open');
  $('devLogPanel').classList.add('open');
  loadDevQueue();
}

function closeDevLog(){
  devLogOpen = false;
  $('devLogOverlay').classList.remove('open');
  $('devLogPanel').classList.remove('open');
}

function startDevLogPolling(){
  if(devLogInterval) clearInterval(devLogInterval);
  // Poll every 5 seconds during UltimateDEV call
  devLogInterval = setInterval(function(){
    if(currentTier !== 'ultimatedev' || !active) return;
    loadDevQueue();
  }, 5000);
  // Initial load
  loadDevQueue();
}

function stopDevLogPolling(){
  if(devLogInterval){clearInterval(devLogInterval);devLogInterval=null;}
  $('devLogBtn').classList.remove('visible');
}

function loadDevQueue(){
  var userId = $('userIdInput').value.trim();
  if(!userId) return;
  fetch('/api/dev/queue/'+encodeURIComponent(userId))
    .then(function(r){return r.ok?r.json():null;})
    .then(function(data){
      if(!data||!data.queue) return;
      renderDevLog(data.queue);
      // Update badge with active/recent items
      var activeCount = data.queue.filter(function(c){return c.status==='executing'||c.status==='planning'||c.status==='planned';}).length;
      var badge = $('devLogBadge');
      if(activeCount > 0){
        badge.textContent = activeCount;
        badge.classList.add('has-items');
      } else if(data.queue.length !== lastDevQueueCount && data.queue.length > 0){
        badge.textContent = data.queue.length;
        badge.classList.add('has-items');
      } else {
        badge.classList.remove('has-items');
      }
      lastDevQueueCount = data.queue.length;
    })
    .catch(function(){});
}

function renderDevLog(queue){
  var list = $('devLogList');
  if(!queue||queue.length===0){
    list.innerHTML = '<div class="dev-log-empty">Nenhuma alteracao ainda</div>';
    return;
  }
  var html = '';
  for(var i=0;i<queue.length;i++){
    var cmd = queue[i];
    var ts = cmd.ts ? new Date(cmd.ts) : null;
    var timeStr = ts ? ts.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    var statusLabels = {
      planning:'Planejando',
      planned:'Plano pronto',
      executing:'Executando',
      executing_git:'Commitando',
      done:'Concluido',
      failed:'Falhou',
      plan_failed:'Plano falhou',
      partial:'Parcial',
      rejected:'Rejeitado'
    };
    var statusLabel = statusLabels[cmd.status]||cmd.status;
    var resultClass = '';
    if(cmd.status==='done') resultClass='success';
    else if(cmd.status==='failed'||cmd.status==='plan_failed') resultClass='error';
    else if(cmd.status==='partial') resultClass='warn';

    html += '<div class="dev-log-item">';
    html += '<div class="dev-log-item-header">';
    html += '<div class="dev-log-status '+cmd.status+'"></div>';
    html += '<span class="dev-log-status-label '+cmd.status+'">'+statusLabel+'</span>';
    html += '<span class="dev-log-item-time">'+timeStr+'</span>';
    html += '</div>';
    html += '<div class="dev-log-instruction">'+escHtml(cmd.instruction||'')+'</div>';

    if(cmd.plan){
      var planId = 'plan_'+i;
      html += '<button class="dev-log-toggle" onclick="togglePlan(\''+planId+'\')">Ver plano</button>';
      html += '<div class="dev-log-plan" id="'+planId+'">'+escHtml(cmd.plan)+'</div>';
    }

    if(cmd.result){
      html += '<div class="dev-log-result '+resultClass+'">'+escHtml(cmd.result)+'</div>';
    }

    html += '</div>';
  }
  list.innerHTML = html;
}

function togglePlan(id){
  var el = document.getElementById(id);
  if(el) el.classList.toggle('expanded');
}

function escHtml(str){
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// -- URL params --
var params = new URLSearchParams(location.search);
if(params.get('userId')) $('userIdInput').value = params.get('userId');
if(params.get('tier')){
  var tier = params.get('tier');
  if(TIERS[tier] && params.get('userId')){
    setTimeout(function(){ startCall(tier); }, 500);
  }
}
</script>
</body>
</html>
