<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Revelacao</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;width:100vw;height:100vh;height:100dvh;display:flex;align-items:center;justify-content:center}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover}
#count{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:2;background:#000}
#count span{font-size:10rem;font-weight:900;color:#fff;text-shadow:0 0 60px rgba(255,255,255,.5)}
#nameBox{position:fixed;bottom:10%;left:0;right:0;text-align:center;z-index:3;opacity:0;transition:opacity 1s}
#nameBox.show{opacity:1}
#nameBox div{display:inline-block;background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:1rem 2.5rem;border-radius:16px}
#nameBox h1{font-size:2.5rem;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,255,255,.4)}
#nameBox p{font-size:1.1rem;font-weight:700;margin-top:.3rem}
#closeBtn{position:fixed;top:12px;right:12px;z-index:10;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
#err{color:#ef4444;font-size:1.2rem;font-weight:600}
</style>
</head>
<body>

<div id="count"><span id="num"></span></div>
<video id="vid" playsinline webkit-playsinline muted preload="auto"></video>
<div id="nameBox"><div><h1 id="bname"></h1><p id="blabel"></p></div></div>
<button id="closeBtn" onclick="window.history.back()">X</button>

<script>
var params=new URLSearchParams(window.location.search);
var eventId=params.get('event')||params.get('e')||'';

if(!eventId){
  document.getElementById('num').outerHTML='<span id="err">Evento nao encontrado</span>';
}else{
  // Fetch reveal data from API
  fetch('/api/event/'+eventId+'/charevela')
    .then(function(r){return r.json()})
    .then(function(d){
      if(!d.config||!d.config.revealed||!d.config.answer){
        // Not revealed yet - wait for socket
        document.getElementById('num').textContent='';
        document.getElementById('count').innerHTML='<span style="font-size:1.2rem;color:rgba(255,255,255,.7);font-weight:600">Aguardando a revelacao...</span>';
        waitForSocket();
        return;
      }
      // Already revealed - run the full experience
      var answer=d.config.answer;
      var label=answer==='optionA'?(d.config.optionA||'Menino'):(d.config.optionB||'Menina');
      var color=answer==='optionA'?(d.config.colorA||'#3b82f6'):(d.config.colorB||'#ec4899');
      var babyName=d.config.babyName||'';
      var videoSrc=answer==='optionA'?'/reveal-boy-lite.mp4':'/reveal-girl-lite.mp4';
      runReveal(videoSrc,babyName,label,color);
    })
    .catch(function(e){
      document.getElementById('num').outerHTML='<span id="err">Erro ao carregar</span>';
    });
}

function waitForSocket(){
  var s=document.createElement('script');
  s.src='/socket.io/socket.io.js';
  s.onload=function(){
    var socket=io();
    socket.emit('join-event-room',eventId);
    socket.on('charevela-reveal',function(data){
      if(data.eventId!==eventId)return;
      var answer=data.answer||'';
      var label=data.answerLabel||'???';
      var color=data.color||'#ec4899';
      var babyName=data.babyName||'';
      var videoSrc=answer==='optionA'?'/reveal-boy-lite.mp4':'/reveal-girl-lite.mp4';
      runReveal(videoSrc,babyName,label,color);
    });
  };
  document.body.appendChild(s);
}

function runReveal(videoSrc,babyName,label,color){
  // Step 1: preload video immediately
  var vid=document.getElementById('vid');
  vid.src=videoSrc;
  vid.load();

  // Step 2: countdown 5..1
  var countEl=document.getElementById('count');
  var numEl=document.getElementById('num');
  if(!numEl){
    // recreate if we replaced it earlier (waiting state)
    countEl.innerHTML='<span id="num">5</span>';
    countEl.style.background='#000';
    numEl=document.getElementById('num');
    numEl.style.fontSize='10rem';
    numEl.style.fontWeight='900';
    numEl.style.color='#fff';
    numEl.style.textShadow='0 0 60px rgba(255,255,255,.5)';
  }
  numEl.textContent='5';

  if(navigator.vibrate)navigator.vibrate([200,100,200]);

  var c=5;
  var t=setInterval(function(){
    c--;
    if(c>0){
      numEl.textContent=c;
      if(c<=2)numEl.style.color=color;
      if(navigator.vibrate)navigator.vibrate(c<=2?100:50);
    }else{
      clearInterval(t);
      // Step 3: hide countdown, play video
      countEl.style.display='none';
      vid.currentTime=0;
      vid.muted=true;
      vid.play().then(function(){
        try{vid.muted=false}catch(e){}
      }).catch(function(e){
        console.warn('play err:',e.message);
      });
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);

      // Step 4: show name after 7s
      if(babyName||label){
        setTimeout(function(){
          if(babyName)document.getElementById('bname').textContent=babyName;
          var lbl=document.getElementById('blabel');
          lbl.textContent=label;
          lbl.style.color=color;
          document.getElementById('nameBox').classList.add('show');
        },7000);
      }
    }
  },1000);
}
</script>
</body>
</html>
