<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Touch? TV</title>
<style>
/* ===========================================
   Touch? TV Mode - Optimized for Smart TVs
   No heavy animations, no blur, no canvas
   Target: 1920x1080, older smart TV browsers
   =========================================== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050508;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}

/* --- Pairing Screen --- */
#pairScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;width:100vw;background:linear-gradient(135deg,#050508 0%,#0d0d1a 50%,#050508 100%)}
#pairScreen .logo{font-size:72px;font-weight:800;letter-spacing:-2px;margin-bottom:20px}
#pairScreen .logo span{color:#ff6b35}
#pairScreen .subtitle{font-size:28px;color:#888;margin-bottom:60px}
#qrContainer{background:#fff;padding:28px;border-radius:20px;margin-bottom:40px;min-width:280px;min-height:280px;display:flex;align-items:center;justify-content:center}
#qrContainer canvas,#qrContainer img{display:block;width:240px;height:240px;image-rendering:pixelated}
#pairCode{font-size:48px;font-weight:700;letter-spacing:12px;color:#ff6b35;margin-bottom:20px}
#pairHint{font-size:22px;color:#666}
#pairExpiry{font-size:18px;color:#444;margin-top:12px}

/* --- Main TV Display --- */
#tvMain{display:none;width:100vw;height:100vh;position:relative;background:#050508}

/* Header bar */
.tv-header{position:absolute;top:0;left:0;right:0;height:80px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(10,10,18,0.95);z-index:10;border-bottom:1px solid rgba(255,107,53,0.15)}
.tv-header .ev-name{font-size:32px;font-weight:700;letter-spacing:-0.5px}
.tv-header .ev-count{font-size:24px;color:#ff6b35;font-weight:600}
.tv-header .ev-count span{color:#888;font-weight:400;margin-right:8px}
.tv-header .ev-logo{width:52px;height:52px;border-radius:12px;object-fit:cover;margin-right:16px}
.tv-header .left{display:flex;align-items:center}

/* Tab indicator */
.tv-tabs{position:absolute;bottom:0;left:0;right:0;height:6px;display:flex;z-index:10}
.tv-tab-dot{flex:1;background:rgba(255,255,255,0.08);transition:background 0.3s}
.tv-tab-dot.active{background:#ff6b35}

/* Tab navigation hint */
.tv-nav-hint{position:absolute;bottom:16px;right:48px;font-size:16px;color:#444;z-index:10}

/* Content area */
.tv-content{position:absolute;top:80px;bottom:6px;left:0;right:0;overflow:hidden}
.tv-slide{display:none;width:100%;height:100%;padding:48px}
.tv-slide.active{display:flex}

/* --- Aba 1: Welcome --- */
.welcome-slide{flex-direction:column;align-items:center;justify-content:center;text-align:center}
.welcome-slide .ev-logo-big{width:180px;height:180px;border-radius:24px;object-fit:cover;margin-bottom:32px;border:3px solid rgba(255,107,53,0.3)}
.welcome-slide .welcome-phrase{font-size:36px;font-weight:300;color:#ccc;margin-bottom:48px;max-width:900px;line-height:1.4}
.welcome-slide .qr-checkin{background:#fff;padding:16px;border-radius:12px;margin-bottom:24px}
.welcome-slide .qr-label{font-size:22px;color:#888;margin-bottom:8px}
.welcome-slide .people-count{font-size:64px;font-weight:800;color:#ff6b35;margin-top:24px}
.welcome-slide .people-label{font-size:22px;color:#666}

/* --- Aba 2: Ranking --- */
.ranking-slide{flex-direction:column;padding:48px 80px}
.ranking-slide h2{font-size:40px;font-weight:700;margin-bottom:32px;color:#ff6b35}
.ranking-list{flex:1;display:flex;flex-direction:column;gap:8px}
.ranking-item{display:flex;align-items:center;padding:16px 24px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:background 0.3s}
.ranking-item.top3{background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.15)}
.ranking-pos{font-size:36px;font-weight:800;width:60px;text-align:center;color:#ff6b35}
.ranking-item:nth-child(1) .ranking-pos{color:#ffd700}
.ranking-item:nth-child(2) .ranking-pos{color:#c0c0c0}
.ranking-item:nth-child(3) .ranking-pos{color:#cd7f32}
.ranking-avatar{width:48px;height:48px;border-radius:50%;margin:0 20px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.ranking-nick{font-size:28px;font-weight:600;flex:1}
.ranking-score{font-size:28px;font-weight:700;color:#ff6b35;margin-right:24px}
.ranking-stars{font-size:22px;color:#ffd700}
.ranking-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:28px;color:#444}

/* --- Aba 3: Feed --- */
.feed-slide{flex-direction:column;padding:48px 80px}
.feed-slide h2{font-size:40px;font-weight:700;margin-bottom:32px;color:#ff6b35}
.feed-list{flex:1;display:flex;flex-direction:column;gap:12px;overflow:hidden}
.feed-item{display:flex;align-items:center;padding:20px 24px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);opacity:0;transform:translateY(20px);animation:feedIn 0.4s forwards}
@keyframes feedIn{to{opacity:1;transform:translateY(0)}}
.feed-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-right:20px;flex-shrink:0;font-size:20px}
.feed-icon.checkin{background:rgba(16,185,129,0.15);color:#10b981}
.feed-icon.tip{background:rgba(255,107,53,0.15);color:#ff6b35}
.feed-icon.star{background:rgba(255,215,0,0.15);color:#ffd700}
.feed-text{font-size:26px;flex:1}
.feed-text strong{color:#fff;font-weight:600}
.feed-time{font-size:18px;color:#555;margin-left:16px;flex-shrink:0}
.feed-empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:28px;color:#444}

/* --- Aba 4: Karaoke --- */
.karaoke-slide{flex-direction:column;align-items:center;justify-content:center;text-align:center}
.karaoke-slide h2{font-size:40px;font-weight:700;margin-bottom:16px;color:#ec4899}
.karaoke-now{font-size:48px;font-weight:800;margin-bottom:8px}
.karaoke-song{font-size:32px;color:#ccc;margin-bottom:48px}
.karaoke-queue-title{font-size:24px;color:#888;margin-bottom:16px}
.karaoke-queue{display:flex;flex-direction:column;gap:8px;width:600px}
.karaoke-queue-item{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-radius:8px;background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.15);font-size:24px}
.karaoke-queue-pos{font-weight:700;color:#ec4899;margin-right:16px}
.karaoke-scores{margin-top:32px;display:flex;gap:24px}
.karaoke-score-card{padding:16px 24px;border-radius:12px;background:rgba(236,72,153,0.08);border:1px solid rgba(236,72,153,0.15)}
.karaoke-score-nick{font-size:22px;font-weight:600}
.karaoke-score-pts{font-size:28px;font-weight:800;color:#ec4899}

/* --- Aba 5: DJ Live --- */
.dj-slide{flex-direction:column;align-items:center;justify-content:center;text-align:center}
.dj-name{font-size:64px;font-weight:800;margin-bottom:16px}
.dj-bpm{font-size:36px;font-weight:300;margin-bottom:48px}
.dj-bpm strong{font-weight:700}
.dj-wave{display:flex;align-items:flex-end;gap:4px;height:120px;margin-bottom:32px}
.dj-bar{width:6px;border-radius:3px;background:currentColor;animation:djPulse 0.8s ease-in-out infinite alternate}
@keyframes djPulse{0%{height:20%}100%{height:100%}}

/* --- Utility --- */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- ============ PAIRING SCREEN ============ -->
<div id="pairScreen">
  <div class="logo">Touch<span>?</span></div>
  <div class="subtitle">TV Display Mode</div>
  <div id="qrContainer"></div>
  <div id="pairCode">------</div>
  <div id="pairHint">Scan this QR code with your phone to connect a event</div>
  <div id="pairExpiry"></div>
</div>

<!-- ============ MAIN TV DISPLAY ============ -->
<div id="tvMain">
  <!-- Header -->
  <div class="tv-header">
    <div class="left">
      <img class="ev-logo hidden" id="tvEvLogo" src="" alt="">
      <div class="ev-name" id="tvEvName">Event</div>
    </div>
    <div class="ev-count"><span>People here:</span> <b id="tvPeopleCount">0</b></div>
  </div>

  <!-- Content slides -->
  <div class="tv-content">
    <!-- Slide 0: Welcome -->
    <div class="tv-slide welcome-slide active" data-slide="0">
      <img class="ev-logo-big hidden" id="tvWelcomeLogo" src="" alt="">
      <div class="welcome-phrase" id="tvWelcomePhrase">Welcome!</div>
      <div class="qr-label">Scan to join</div>
      <div class="qr-checkin" id="tvCheckinQR"></div>
      <div class="people-count" id="tvWelcomeCount">0</div>
      <div class="people-label">people here</div>
    </div>

    <!-- Slide 1: Ranking -->
    <div class="tv-slide ranking-slide" data-slide="1">
      <h2>Live Ranking</h2>
      <div class="ranking-list" id="tvRanking">
        <div class="ranking-empty">No activity yet</div>
      </div>
    </div>

    <!-- Slide 2: Feed -->
    <div class="tv-slide feed-slide" data-slide="2">
      <h2>Live Activity</h2>
      <div class="feed-list" id="tvFeed">
        <div class="feed-empty">Waiting for activity...</div>
      </div>
    </div>

    <!-- Slide 3: Karaoke -->
    <div class="tv-slide karaoke-slide hidden" data-slide="3">
      <h2>Karaoke Live</h2>
      <div class="karaoke-now" id="tvKaraokeNow">--</div>
      <div class="karaoke-song" id="tvKaraokeSong">Waiting for next singer...</div>
      <div class="karaoke-queue-title">Up Next</div>
      <div class="karaoke-queue" id="tvKaraokeQueue"></div>
      <div class="karaoke-scores" id="tvKaraokeScores"></div>
    </div>

    <!-- Slide 4: DJ Live -->
    <div class="tv-slide dj-slide hidden" data-slide="4">
      <div class="dj-name" id="tvDjName">DJ</div>
      <div class="dj-wave" id="tvDjWave"></div>
      <div class="dj-bpm">BPM: <strong id="tvDjBpm">128</strong></div>
    </div>
  </div>

  <!-- Tab dots -->
  <div class="tv-tabs" id="tvTabs"></div>

  <!-- Nav hint -->
  <div class="tv-nav-hint" id="tvNavHint"></div>
</div>

<!-- QR Code library (lightweight, no dependencies) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// Render QR code using qrcode.js library (CDN)
// Falls back to API-based img if library fails
function renderQR(container, text, size) {
  size = size || 240;
  container.innerHTML = '';
  try {
    new QRCode(container, {
      text: text,
      width: size,
      height: size,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } catch(e) {
    // Fallback: use external QR API as img
    var img = document.createElement('img');
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encodeURIComponent(text);
    img.width = size;
    img.height = size;
    img.alt = 'QR Code';
    img.style.display = 'block';
    container.appendChild(img);
  }
}
</script>

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<script>
(function() {
  'use strict';

  // ========================
  // State
  // ========================
  var state = {
    eventId: null,
    eventName: '',
    eventLogo: null,
    welcomePhrase: '',
    attendeeCount: 0,
    ranking: [],
    feed: [],
    karaoke: { enabled: false },
    djLive: { broadcasting: false },
    modules: {},
    currentSlide: 0,
    slides: [],
    autoRotate: true,
    autoTimer: null,
    pairCode: null,
    socket: null
  };

  var ROTATE_INTERVAL = 20000; // 20 seconds per slide
  var PAIR_CHECK_INTERVAL = 3000;
  var FEED_MAX = 12;
  var HOST = location.origin;

  // ========================
  // Init
  // ========================
  function init() {
    // Check localStorage for saved eventId
    var savedEvent = localStorage.getItem('tv_eventId');
    if (savedEvent) {
      // Try to reconnect directly
      connectToEvent(savedEvent);
    } else {
      showPairingScreen();
    }
  }

  // ========================
  // Pairing
  // ========================
  function showPairingScreen() {
    document.getElementById('pairScreen').style.display = 'flex';
    document.getElementById('tvMain').style.display = 'none';
    generatePairCode();
  }

  function generatePairCode() {
    fetch(HOST + '/api/tv/generate-code', { method: 'POST' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.ok) return;
        state.pairCode = data.code;
        document.getElementById('pairCode').textContent = data.code;

        // Render QR code
        var pairUrl = HOST + '/tv/pair?code=' + data.code;
        renderQR(document.getElementById('qrContainer'), pairUrl, 280);

        // Connect socket for pairing
        if (!state.socket) {
          state.socket = io(HOST, { transports: ['websocket', 'polling'] });
        }
        state.socket.emit('tv-register', { code: data.code });

        // Listen for pairing
        state.socket.on('tv-paired', function(d) {
          if (d.eventId) {
            localStorage.setItem('tv_eventId', d.eventId);
            connectToEvent(d.eventId);
          }
        });

        // Start expiry countdown
        startExpiryTimer(5 * 60);
      })
      .catch(function() {
        setTimeout(generatePairCode, 5000);
      });
  }

  var expiryInterval = null;
  function startExpiryTimer(seconds) {
    if (expiryInterval) clearInterval(expiryInterval);
    var remaining = seconds;
    var el = document.getElementById('pairExpiry');
    expiryInterval = setInterval(function() {
      remaining--;
      if (remaining <= 0) {
        clearInterval(expiryInterval);
        el.textContent = 'Code expired. Generating new one...';
        generatePairCode();
        return;
      }
      var m = Math.floor(remaining / 60);
      var s = remaining % 60;
      el.textContent = 'Expires in ' + m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
  }

  // ========================
  // Connect to Event
  // ========================
  function connectToEvent(eventId) {
    state.eventId = eventId;

    // Fetch initial data
    fetch(HOST + '/api/tv/feed/' + eventId)
      .then(function(r) {
        if (!r.ok) throw new Error('Event not found');
        return r.json();
      })
      .then(function(data) {
        if (!data.eventId) throw new Error('Invalid event');
        updateState(data);
        showTVDisplay();
        setupSocket(eventId);
        startAutoRotate();
      })
      .catch(function() {
        // Event doesn't exist anymore
        localStorage.removeItem('tv_eventId');
        showPairingScreen();
      });
  }

  function updateState(data) {
    state.eventName = data.eventName || 'Event';
    state.eventLogo = data.eventLogo || null;
    state.welcomePhrase = data.welcomePhrase || 'Welcome!';
    state.attendeeCount = data.attendeeCount || 0;
    state.ranking = data.ranking || [];
    state.feed = data.feed || [];
    state.karaoke = data.karaoke || { enabled: false };
    state.djLive = data.djLive || { broadcasting: false };
    state.modules = data.modules || {};
  }

  // ========================
  // Socket Setup
  // ========================
  function setupSocket(eventId) {
    if (!state.socket) {
      state.socket = io(HOST, { transports: ['websocket', 'polling'] });
    }
    state.socket.emit('tv-join-event', eventId);

    // Checkin events
    state.socket.on('tv-checkin', function(d) {
      state.attendeeCount++;
      state.feed.unshift({
        type: 'checkin',
        nickname: d.nickname,
        color: d.color,
        timestamp: d.timestamp || Date.now(),
        text: d.nickname + ' just arrived!'
      });
      if (state.feed.length > FEED_MAX) state.feed = state.feed.slice(0, FEED_MAX);
      // Update ranking if needed
      refreshFeed();
      renderWelcome();
      renderFeed();
    });

    state.socket.on('event-attendee-joined', function(d) {
      // Also handle the standard event - update count
      renderWelcome();
    });

    // Tip events
    state.socket.on('tv-tip', function(d) {
      state.feed.unshift({
        type: 'tip',
        nickname: d.nickname,
        amount: d.amount,
        timestamp: d.timestamp || Date.now(),
        text: d.nickname + ' tipped $' + (d.amount || 0).toFixed(2) + '!'
      });
      if (state.feed.length > FEED_MAX) state.feed = state.feed.slice(0, FEED_MAX);
      renderFeed();
    });

    // Karaoke updates
    state.socket.on('karaoke-update', function(d) {
      state.karaoke.currentSinger = d.currentSinger || null;
      state.karaoke.queue = d.queue || [];
      state.karaoke.scores = d.scores || {};
      renderKaraoke();
      buildSlides();
    });

    // DJ updates (from existing event room)
    state.socket.on('dj-live-update', function(d) {
      if (d) {
        state.djLive.broadcasting = d.broadcasting || false;
        state.djLive.djName = d.djName || d.artistName || 'DJ';
        state.djLive.bpm = d.bpm || 128;
        state.djLive.color = d.color || '#ff6b35';
      }
      renderDJ();
      buildSlides();
    });

    // Periodic refresh (every 60s fetch full feed)
    setInterval(function() { refreshFeed(); }, 60000);
  }

  function refreshFeed() {
    if (!state.eventId) return;
    fetch(HOST + '/api/tv/feed/' + state.eventId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        updateState(data);
        renderAll();
        buildSlides();
      })
      .catch(function() {});
  }

  // ========================
  // TV Display
  // ========================
  function showTVDisplay() {
    document.getElementById('pairScreen').style.display = 'none';
    document.getElementById('tvMain').style.display = 'block';
    if (expiryInterval) clearInterval(expiryInterval);
    buildSlides();
    renderAll();
  }

  function buildSlides() {
    var slides = [0, 1, 2]; // Welcome, Ranking, Feed always visible

    // Karaoke slide (3) - only if module active
    var karaokeSlide = document.querySelector('[data-slide="3"]');
    if (state.modules.karaoke && state.karaoke.enabled) {
      karaokeSlide.classList.remove('hidden');
      if (slides.indexOf(3) === -1) slides.push(3);
    } else {
      karaokeSlide.classList.add('hidden');
      var idx3 = slides.indexOf(3);
      if (idx3 !== -1) slides.splice(idx3, 1);
    }

    // DJ slide (4) - only if DJ is broadcasting
    var djSlide = document.querySelector('[data-slide="4"]');
    if (state.djLive.broadcasting) {
      djSlide.classList.remove('hidden');
      if (slides.indexOf(4) === -1) slides.push(4);
    } else {
      djSlide.classList.add('hidden');
      var idx4 = slides.indexOf(4);
      if (idx4 !== -1) slides.splice(idx4, 1);
    }

    state.slides = slides;

    // Build tab dots
    var tabsEl = document.getElementById('tvTabs');
    tabsEl.innerHTML = '';
    for (var i = 0; i < slides.length; i++) {
      var dot = document.createElement('div');
      dot.className = 'tv-tab-dot' + (i === state.currentSlide ? ' active' : '');
      tabsEl.appendChild(dot);
    }

    // Ensure current slide is valid
    if (state.currentSlide >= slides.length) {
      state.currentSlide = 0;
    }
    showSlide(state.currentSlide);
  }

  function showSlide(index) {
    if (index < 0 || index >= state.slides.length) return;
    state.currentSlide = index;
    var allSlides = document.querySelectorAll('.tv-slide');
    for (var i = 0; i < allSlides.length; i++) {
      allSlides[i].classList.remove('active');
    }
    var targetSlide = state.slides[index];
    var el = document.querySelector('[data-slide="' + targetSlide + '"]');
    if (el) el.classList.add('active');

    // Update tab dots
    var dots = document.querySelectorAll('.tv-tab-dot');
    for (var j = 0; j < dots.length; j++) {
      dots[j].className = 'tv-tab-dot' + (j === index ? ' active' : '');
    }
  }

  // ========================
  // Auto Rotate
  // ========================
  function startAutoRotate() {
    stopAutoRotate();
    state.autoRotate = true;
    state.autoTimer = setInterval(function() {
      if (!state.autoRotate) return;
      var next = (state.currentSlide + 1) % state.slides.length;
      showSlide(next);
    }, ROTATE_INTERVAL);
  }

  function stopAutoRotate() {
    if (state.autoTimer) clearInterval(state.autoTimer);
    state.autoTimer = null;
  }

  // Keyboard navigation (TV remote)
  var manualTimeout = null;
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === 'Right') {
      var next = (state.currentSlide + 1) % state.slides.length;
      showSlide(next);
      pauseAutoRotate();
    } else if (e.key === 'ArrowLeft' || e.key === 'Left') {
      var prev = (state.currentSlide - 1 + state.slides.length) % state.slides.length;
      showSlide(prev);
      pauseAutoRotate();
    }
  });

  function pauseAutoRotate() {
    state.autoRotate = false;
    if (manualTimeout) clearTimeout(manualTimeout);
    manualTimeout = setTimeout(function() {
      state.autoRotate = true;
    }, 30000);
  }

  // ========================
  // Render Functions
  // ========================
  function renderAll() {
    renderHeader();
    renderWelcome();
    renderRanking();
    renderFeed();
    renderKaraoke();
    renderDJ();
  }

  function renderHeader() {
    document.getElementById('tvEvName').textContent = state.eventName;
    document.getElementById('tvPeopleCount').textContent = state.attendeeCount;

    var logoEl = document.getElementById('tvEvLogo');
    if (state.eventLogo) {
      logoEl.src = state.eventLogo;
      logoEl.classList.remove('hidden');
    } else {
      logoEl.classList.add('hidden');
    }
  }

  function renderWelcome() {
    document.getElementById('tvWelcomePhrase').textContent = state.welcomePhrase || 'Welcome!';
    document.getElementById('tvWelcomeCount').textContent = state.attendeeCount;

    var wLogo = document.getElementById('tvWelcomeLogo');
    if (state.eventLogo) {
      wLogo.src = state.eventLogo;
      wLogo.classList.remove('hidden');
    } else {
      wLogo.classList.add('hidden');
    }

    // Render checkin QR
    if (state.eventId) {
      renderQR(document.getElementById('tvCheckinQR'), HOST + '/e/' + state.eventId, 200);
    }
  }

  function renderRanking() {
    var container = document.getElementById('tvRanking');
    if (!state.ranking || state.ranking.length === 0) {
      container.innerHTML = '<div class="ranking-empty">No activity yet</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < state.ranking.length && i < 10; i++) {
      var r = state.ranking[i];
      var isTop3 = i < 3 ? ' top3' : '';
      var initial = (r.nickname || '?').charAt(0).toUpperCase();
      var color = r.color || '#ff6b35';
      var starsStr = '';
      if (r.stars > 0) {
        for (var s = 0; s < Math.min(r.stars, 5); s++) starsStr += '*';
      }
      html += '<div class="ranking-item' + isTop3 + '">'
        + '<div class="ranking-pos">#' + (i + 1) + '</div>'
        + '<div class="ranking-avatar" style="background:' + color + '">' + initial + '</div>'
        + '<div class="ranking-nick">' + escHtml(r.nickname || '?') + '</div>'
        + '<div class="ranking-score">' + Math.round(r.score || 0) + ' coins</div>'
        + (starsStr ? '<div class="ranking-stars">' + starsStr + '</div>' : '')
        + '</div>';
    }
    container.innerHTML = html;
  }

  function renderFeed() {
    var container = document.getElementById('tvFeed');
    if (!state.feed || state.feed.length === 0) {
      container.innerHTML = '<div class="feed-empty">Waiting for activity...</div>';
      return;
    }
    var html = '';
    var items = state.feed.slice(0, FEED_MAX);
    for (var i = 0; i < items.length; i++) {
      var f = items[i];
      var iconClass = f.type || 'checkin';
      var iconSVG = '';
      if (iconClass === 'checkin') {
        iconSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>';
      } else if (iconClass === 'tip') {
        iconSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>';
      } else {
        iconSVG = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
      }
      var timeStr = formatTime(f.timestamp);
      html += '<div class="feed-item" style="animation-delay:' + (i * 0.05) + 's">'
        + '<div class="feed-icon ' + iconClass + '">' + iconSVG + '</div>'
        + '<div class="feed-text">' + escHtml(f.text || '') + '</div>'
        + '<div class="feed-time">' + timeStr + '</div>'
        + '</div>';
    }
    container.innerHTML = html;
  }

  function renderKaraoke() {
    if (!state.karaoke.enabled) return;

    var now = state.karaoke.currentSinger;
    if (now) {
      document.getElementById('tvKaraokeNow').textContent = escHtml(now.nickname || now.name || '?');
      document.getElementById('tvKaraokeSong').textContent = escHtml(now.songTitle || now.song || 'Singing...');
    } else {
      document.getElementById('tvKaraokeNow').textContent = '--';
      document.getElementById('tvKaraokeSong').textContent = 'Waiting for next singer...';
    }

    // Queue
    var queueEl = document.getElementById('tvKaraokeQueue');
    var queue = state.karaoke.queue || [];
    var html = '';
    for (var i = 0; i < Math.min(queue.length, 5); i++) {
      var q = queue[i];
      html += '<div class="karaoke-queue-item">'
        + '<span class="karaoke-queue-pos">' + (i + 1) + '</span>'
        + '<span>' + escHtml(q.nickname || q.name || '?') + '</span>'
        + '<span style="color:#888">' + escHtml(q.songTitle || q.song || '') + '</span>'
        + '</div>';
    }
    queueEl.innerHTML = html;

    // Scores (top 5)
    var scoresEl = document.getElementById('tvKaraokeScores');
    var scores = state.karaoke.scores || {};
    var scoreArr = [];
    for (var uid in scores) {
      if (scores.hasOwnProperty(uid)) {
        scoreArr.push({ uid: uid, score: scores[uid].total || scores[uid] || 0, nick: scores[uid].nickname || uid.slice(0, 6) });
      }
    }
    scoreArr.sort(function(a, b) { return b.score - a.score; });
    var shtml = '';
    for (var j = 0; j < Math.min(scoreArr.length, 5); j++) {
      shtml += '<div class="karaoke-score-card">'
        + '<div class="karaoke-score-nick">' + escHtml(scoreArr[j].nick) + '</div>'
        + '<div class="karaoke-score-pts">' + scoreArr[j].score + ' pts</div>'
        + '</div>';
    }
    scoresEl.innerHTML = shtml;
  }

  function renderDJ() {
    if (!state.djLive.broadcasting) return;

    var color = state.djLive.color || '#ff6b35';
    document.getElementById('tvDjName').textContent = state.djLive.djName || 'DJ';
    document.getElementById('tvDjName').style.color = color;
    document.getElementById('tvDjBpm').textContent = state.djLive.bpm || 128;

    // Render simple wave bars (lightweight, no canvas)
    var waveEl = document.getElementById('tvDjWave');
    if (waveEl.children.length === 0) {
      var html = '';
      for (var i = 0; i < 40; i++) {
        var delay = (i * 0.05).toFixed(2);
        html += '<div class="dj-bar" style="color:' + color + ';animation-delay:' + delay + 's;height:' + (20 + Math.random() * 80) + '%"></div>';
      }
      waveEl.innerHTML = html;
    }
  }

  // ========================
  // Helpers
  // ========================
  function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function formatTime(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var now = new Date();
    var diff = now - d;
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    return d.toLocaleDateString();
  }

  // ========================
  // Start
  // ========================
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  // Check if this is the pairing page opened on mobile
  if (location.pathname === '/tv/pair' && location.search) {
    var params = new URLSearchParams(location.search);
    var pairCodeFromUrl = params.get('code');
    if (pairCodeFromUrl) {
      showMobilePairingUI(pairCodeFromUrl);
    }
  }

  function showMobilePairingUI(code) {
    // Replace the entire page with mobile pairing UI
    document.body.innerHTML = '<div id="mobilePair" style="min-height:100vh;background:#050508;color:#fff;font-family:-apple-system,sans-serif;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center">'
      + '<div style="font-size:32px;font-weight:800;margin-bottom:8px">Touch<span style="color:#ff6b35">?</span></div>'
      + '<div style="font-size:16px;color:#888;margin-bottom:32px">Pair TV Display</div>'
      + '<div id="mpLoading" style="color:#888">Loading your events...</div>'
      + '<div id="mpEvents" style="width:100%;max-width:400px"></div>'
      + '<div id="mpStatus" style="margin-top:24px;font-size:14px;color:#666"></div>'
      + '</div>';

    // Need userId - check localStorage (main app uses 'touch_userId')
    var userId = localStorage.getItem('touch_userId') || localStorage.getItem('touchUserId') || localStorage.getItem('userId');
    if (!userId) {
      document.getElementById('mpLoading').innerHTML = '<div style="text-align:center">'
        + '<div style="color:#ccc;font-size:18px;margin-bottom:20px">You need to be logged in to pair a TV.</div>'
        + '<a href="/" style="display:inline-block;padding:14px 32px;background:#ff6b35;color:#fff;border-radius:10px;text-decoration:none;font-size:16px;font-weight:600">Open Touch? and Log In</a>'
        + '<div style="color:#555;font-size:13px;margin-top:16px">After logging in, scan the TV QR code again.</div>'
        + '</div>';
      return;
    }

    // Fetch operator events
    fetch(HOST + '/api/operator/events-for-tv/' + userId)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('mpLoading').style.display = 'none';
        var events = data.events || [];
        if (events.length === 0) {
          document.getElementById('mpEvents').innerHTML = '<div style="text-align:center;color:#888;padding:24px">No active events found. Create an event first in the operator panel.</div>';
          return;
        }
        var html = '<div style="font-size:14px;color:#888;margin-bottom:16px;text-align:center">Select an event to display on the TV:</div>';
        for (var i = 0; i < events.length; i++) {
          var ev = events[i];
          html += '<button onclick="pairEvent(\'' + ev.id + '\')" style="display:flex;align-items:center;width:100%;padding:16px;margin-bottom:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:18px;cursor:pointer;text-align:left">';
          if (ev.eventLogo) {
            html += '<img src="' + ev.eventLogo + '" style="width:44px;height:44px;border-radius:8px;margin-right:12px;object-fit:cover" onerror="this.style.display=\'none\'">';
          }
          html += '<div><div style="font-weight:600">' + escHtml(ev.name) + '</div><div style="font-size:14px;color:#888">' + (ev.attendeeCount || 0) + ' people</div></div>';
          html += '</button>';
        }
        document.getElementById('mpEvents').innerHTML = html;
      })
      .catch(function() {
        document.getElementById('mpLoading').textContent = 'Error loading events. Please try again.';
      });

    // Global function for button clicks
    window.pairEvent = function(eventId) {
      var statusEl = document.getElementById('mpStatus');
      statusEl.textContent = 'Connecting TV...';
      statusEl.style.color = '#ff6b35';

      fetch(HOST + '/api/tv/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code: code, eventId: eventId, userId: userId })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.ok) {
            statusEl.innerHTML = '<div style="color:#10b981;font-size:18px;font-weight:600">TV Connected!</div><div style="color:#888;margin-top:8px">The TV is now showing: ' + escHtml(data.eventName || 'your event') + '</div><div style="color:#555;margin-top:16px">You can close this page.</div>';
            document.getElementById('mpEvents').style.display = 'none';
          } else {
            statusEl.textContent = data.error || 'Error pairing. Try again.';
            statusEl.style.color = '#ef4444';
          }
        })
        .catch(function() {
          statusEl.textContent = 'Connection error. Please try again.';
          statusEl.style.color = '#ef4444';
        });
    };
  }

})();
</script>
</body>
</html>
