<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Memória - Touch?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0f;
      --s1: #12121a;
      --s2: #1a1a24;
      --b1: rgba(255,255,255,.08);
      --t1: #f5f5f7;
      --t2: #8888a0;
      --t3: #555568;
      --ac: #ff6b35;
      --ac2: #ff8f65;
      --ok: #34d399;
      --err: #f87171;
      --gap: 12px;
      --card-size: min(80px, 18vw);
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background-color: var(--bg);
      color: var(--t1);
      overflow: hidden;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: linear-gradient(135deg, var(--bg) 0%, var(--s1) 100%);
    }

    /* ═════ HEADER ═════ */
    .game-header {
      padding: 16px;
      border-bottom: 1px solid var(--b1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      background-color: var(--s2);
    }

    .g-status {
      font-size: 14px;
      color: var(--t2);
      font-weight: 500;
    }

    .g-status.multiplayer {
      color: var(--ac);
      font-weight: 600;
    }

    .g-score {
      font-size: 18px;
      font-weight: 700;
      color: var(--t1);
      min-width: 100px;
      text-align: right;
    }

    .scores-container {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .player-score {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .player-score-label {
      font-size: 11px;
      color: var(--t3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .player-score-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--t1);
    }

    .player-score.opponent .player-score-value {
      color: var(--t2);
    }

    .player-score.current::before {
      content: '';
      display: block;
      width: 6px;
      height: 6px;
      background-color: var(--ac);
      border-radius: 50%;
      margin-bottom: 4px;
    }

    /* ═════ GAME BOARD ═════ */
    .game-board-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: auto;
    }

    .game-board {
      display: grid;
      grid-template-columns: repeat(4, var(--card-size));
      gap: var(--gap);
      max-width: 100%;
    }

    /* ═════ CARDS ═════ */
    .card {
      width: var(--card-size);
      height: var(--card-size);
      min-width: 44px;
      min-height: 44px;
      cursor: pointer;
      background: none;
      border: none;
      perspective: 1000px;
      position: relative;
      transition: transform 0.2s ease;
    }

    .card:active {
      transform: scale(0.95);
    }

    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-style: preserve-3d;
    }

    .card.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card.matched .card-inner {
      animation: matched-glow 0.4s ease forwards;
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 32px;
    }

    .card-back {
      background: linear-gradient(145deg, rgba(30,30,45,.9), rgba(15,15,25,.95));
      border: 1.5px solid rgba(255,255,255,.08);
      color: var(--t2);
      box-shadow: 0 8px 24px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
      overflow: hidden;
    }

    .card-back::before {
      content: 'T?';
      position: absolute;
      font-size: 24px;
      font-weight: 900;
      color: var(--ac);
      opacity: 0.12;
      transform: rotate(-15deg);
    }

    .card-back::after {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.03);
      pointer-events: none;
    }

    .card-front {
      background: linear-gradient(145deg, rgba(20,20,35,.95), rgba(10,10,20,.98));
      border: 1.5px solid rgba(255,255,255,.1);
      color: var(--ac);
      box-shadow: 0 8px 24px rgba(0,0,0,.3);
      backface-visibility: hidden;
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      animation: glow-pulse 1.5s ease-in-out infinite;
      border-color: var(--ok);
      color: var(--ok);
    }

    @keyframes matched-glow {
      0% {
        transform: rotateY(180deg) scale(1);
      }
      50% {
        transform: rotateY(180deg) scale(1.08);
      }
      100% {
        transform: rotateY(180deg) scale(1);
      }
    }

    @keyframes glow-pulse {
      0%, 100% {
        box-shadow: 0 8px 24px rgba(52, 211, 153, 0.2);
      }
      50% {
        box-shadow: 0 8px 32px rgba(52, 211, 153, 0.4);
      }
    }

    /* ═════ SVG ICONS ═════ */
    .card-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-icon svg {
      width: 65%;
      height: 65%;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.3));
    }

    /* ═════ FOOTER ═════ */
    .game-footer {
      padding: 16px;
      border-top: 1px solid var(--b1);
      display: flex;
      gap: 12px;
      background-color: var(--s2);
      justify-content: center;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background-color: var(--ac);
      color: white;
    }

    .btn-primary:active {
      transform: scale(0.98);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
    }

    .btn-secondary {
      background-color: var(--s1);
      color: var(--t2);
      border: 1px solid var(--b1);
    }

    .btn-secondary:active {
      background-color: var(--s2);
      transform: scale(0.98);
    }

    /* ═════ WIN MODAL ═════ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active {
      display: flex;
      animation: modal-fade-in 0.3s ease;
    }

    @keyframes modal-fade-in {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .modal {
      background: linear-gradient(135deg, var(--s2) 0%, var(--s1) 100%);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      max-width: 90%;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      animation: modal-bounce 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border: 1px solid var(--b1);
    }

    @keyframes modal-bounce {
      0% {
        transform: scale(0.8) translateY(20px);
        opacity: 0;
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    .modal h2 {
      font-size: 28px;
      margin-bottom: 12px;
      color: var(--ok);
      font-weight: 700;
    }

    .modal-stats {
      text-align: left;
      background-color: var(--s1);
      border-radius: 12px;
      padding: 16px;
      margin: 20px 0;
      border: 1px solid var(--b1);
    }

    .modal-stat-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      color: var(--t2);
    }

    .modal-stat-row strong {
      color: var(--t1);
      font-weight: 600;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-buttons .btn {
      flex: 1;
    }

    /* ═════ RESPONSIVE ═════ */
    @media (max-width: 480px) {
      :root {
        --card-size: min(70px, 20vw);
      }

      .game-header {
        flex-wrap: wrap;
        gap: 12px;
      }

      .scores-container {
        width: 100%;
        gap: 16px;
      }

      .g-status {
        flex: 1;
      }

      .g-score {
        min-width: auto;
      }

      .modal {
        width: 90%;
        padding: 32px 20px;
      }

      .btn {
        padding: 10px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <div class="g-status">Jogo da Memória</div>
      <div class="scores-container">
        <div class="player-score current" id="player-score">
          <div class="player-score-label">Sua Pontuação</div>
          <div class="player-score-value">0</div>
        </div>
        <div class="player-score opponent" id="opponent-score" style="display: none;">
          <div class="player-score-label">Oponente</div>
          <div class="player-score-value">0</div>
        </div>
      </div>
    </div>

    <div class="game-board-wrapper">
      <div class="game-board" id="game-board"></div>
    </div>

    <div class="game-footer">
      <button class="btn btn-secondary" id="btn-quit">Desistir</button>
      <button class="btn btn-primary" id="btn-new-game">Novo Jogo</button>
    </div>
  </div>

  <div class="modal-overlay" id="win-modal">
    <div class="modal">
      <h2>Parabéns!</h2>
      <p style="color: var(--t2); margin-bottom: 16px;">Você encontrou todos os pares!</p>
      <div class="modal-stats">
        <div class="modal-stat-row">
          <span>Pares encontrados:</span>
          <strong id="modal-pairs">8</strong>
        </div>
        <div class="modal-stat-row">
          <span>Movimentos:</span>
          <strong id="modal-moves">0</strong>
        </div>
        <div class="modal-stat-row">
          <span>Tempo:</span>
          <strong id="modal-time">0s</strong>
        </div>
        <div class="modal-stat-row" style="border-top: 1px solid var(--b1); padding-top: 12px; margin-top: 12px; font-size: 16px;">
          <span>Pontuação:</span>
          <strong style="color: var(--ok); font-size: 18px;" id="modal-score">0</strong>
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-secondary" id="modal-btn-quit">Sair</button>
        <button class="btn btn-primary" id="modal-btn-new">Novo Jogo</button>
      </div>
    </div>
  </div>

    <div id="themeGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:.7rem;width:100%;max-width:320px"></div>
  </div>

        fish: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M36 24c0-6-8-12-20-12 6 4 8 8 8 12s-2 8-8 12c12 0 20-6 20-12z"/><path d="M40 18v12l6-6z"/><circle cx="20" cy="22" r="1.5" fill="#0a0a0f"/></svg>',
        octopus: '<svg viewBox="0 0 48 48" fill="currentColor"><ellipse cx="24" cy="18" rx="12" ry="10"/><path d="M12 24c-2 6 0 12 2 14s2-4 2-8m4 8c0 6 2 8 4 6s0-6-2-10m8 10c0 6-2 8-4 6s0-6 2-10m4 8c2 6 0 12-2 14s-2-4-2-8"/><circle cx="20" cy="16" r="2" fill="#0a0a0f"/><circle cx="28" cy="16" r="2" fill="#0a0a0f"/></svg>',
        shell: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M24 40c-10 0-18-6-18-14C6 16 14 8 24 8s18 8 18 18c0 8-8 14-18 14z"/><path d="M24 8c0 10-6 18-14 22m14-22c0 10 6 18 14 22M24 8v32m-10-6c6-4 14-4 20 0" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"/></svg>',
        anchor: '<svg viewBox="0 0 48 48" fill="currentColor"><circle cx="24" cy="10" r="4" fill="none" stroke="currentColor" stroke-width="3"/><path d="M24 14v26m-10-8c0 6 4 8 10 8s10-2 10-8" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/><path d="M18 26h12" stroke="currentColor" stroke-width="3" stroke-linecap="round" fill="none"/></svg>',
        wave: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M4 20c4-4 8-4 12 0s8 4 12 0 8-4 12 0v8c-4 4-8 4-12 0s-8-4-12 0-8 4-12 0z"/><path d="M4 30c4-4 8-4 12 0s8 4 12 0 8-4 12 0v4c-4 4-8 4-12 0s-8-4-12 0-8 4-12 0z" opacity=".5"/></svg>',
        trident: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M22 18v24h4V18h6l-8-14-8 14z"/><path d="M14 18l-4-6v10l4-4zm20 0l4-6v10l-4-4z"/></svg>',
        seahorse: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M28 8c-4 0-8 4-8 8 0 2 1 4 3 5l-3 3c-4 4-4 8-2 12l4-2c-1-2 0-4 2-6l4-4c2 0 4-1 5-3s1-4-1-6c4-2 6-4 6-7h-4c0 2-3 4-6 4v-4z"/><circle cx="24" cy="14" r="1.5"/></svg>',
        coral: '<svg viewBox="0 0 48 48" fill="currentColor"><path d="M24 40v-14l-6-8v-6l4 4v-8l4 6 4-6v8l4-4v6l-6 8v14z"/><path d="M14 40v-10l-4-6v-4l3 3v-6l3 4 3-4v6l3-3v4l-4 6v10z" opacity=".6"/><path d="M34 40v-10l4-6v-4l-3 3v-6l-3 4-3-4v6l-3-3v4l4 6v10z" opacity=".6"/></svg>'
      };
      return svgs[iconId] || svgs['star'];
    }

    // ── Render Theme Selection ──
    (function renderThemes() {
      const grid = document.getElementById('themeGrid');
      Object.keys(MEMORY_THEMES).forEach(key => {
        const t = MEMORY_THEMES[key];
        const btn = document.createElement('button');
        btn.style.cssText = 'background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:1rem .8rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;cursor:pointer;transition:all .2s;color:var(--t1)';
        btn.innerHTML = '<div style="width:36px;height:36px;border-radius:50%;background:'+t.color+';opacity:.8;display:flex;align-items:center;justify-content:center;color:#fff"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4m-2-2v4"/></svg></div><div style="font-size:.75rem;font-weight:600">'+t.name+'</div><div style="font-size:.55rem;color:var(--t3)">'+t.icons.length+' pares</div>';
        btn.addEventListener('click', () => {
          document.getElementById('themeOverlay').style.display = 'none';
          window.memoryGame = new MemoryGame(key);
        });
        btn.addEventListener('touchstart', function(){ this.style.transform='scale(.95)';this.style.borderColor=t.color });
        btn.addEventListener('touchend', function(){ this.style.transform='';this.style.borderColor='rgba(255,255,255,.08)' });
        grid.appendChild(btn);
      });
    })();

    class MemoryGame {
      constructor(themeKey) {
        this.themeKey = themeKey || 'classic';
        this.theme = MEMORY_THEMES[this.themeKey];
        this.cards = [];
        this.flipped = [];
        this.matched = new Set();
        this.moves = 0;
        this.startTime = null;
        this.isProcessing = false;
        this.isMultiplayer = !!touchBridge.opponentId;
        this.isMyTurn = true;
        this.myScore = 0;
        this.opponentScore = 0;

        this.icons = this.theme.icons;

        // Apply theme styles
        document.querySelector('.game-container').style.background = this.theme.bg;

        this.initGame();
        this.attachEventListeners();
        this.setupBridge();
      }

      initGame() {
        this.cards = [];
        this.flipped = [];
        this.matched = new Set();
        this.moves = 0;
        this.startTime = Date.now();
        this.isProcessing = false;
        this.isMyTurn = !this.isMultiplayer || true;

        if (!this.isMultiplayer) {
          this.myScore = 0;
          this.opponentScore = 0;
        }

        this.createCards();
        this.shuffle();
        this.render();
      }

      createCards() {
        const deck = [];
        for (let i = 0; i < this.icons.length; i++) {
          deck.push(this.icons[i]);
          deck.push(this.icons[i]);
        }
        this.cards = deck;
      }

      shuffle() {
        for (let i = this.cards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [this.cards[i], this.cards[j]] = [this.cards[j], this.cards[i]];
        }
      }

      render() {
        const board = document.getElementById('game-board');
        board.innerHTML = '';

        this.cards.forEach((card, index) => {
          const cardEl = document.createElement('button');
          cardEl.className = 'card';
          cardEl.dataset.index = index;

          if (this.flipped.includes(index) || this.matched.has(index)) {
            cardEl.classList.add('flipped');
          }

          if (this.matched.has(index)) {
            cardEl.classList.add('matched');
          }

          const inner = document.createElement('div');
          inner.className = 'card-inner';

          const back = document.createElement('div');
          back.className = 'card-face card-back';
          back.innerHTML = '';

          const front = document.createElement('div');
          front.className = 'card-face card-front';
          front.innerHTML = this.getSVGIcon(card.id);

          inner.appendChild(back);
          inner.appendChild(front);
          cardEl.appendChild(inner);

          board.appendChild(cardEl);
        });

        this.updateStatus();
      }

      getSVGIcon(iconId) {
        const svg = getThemeIcon(iconId);
        return '<div class="card-icon" style="color:'+this.theme.color+'">'+svg+'</div>';
      }

      attachEventListeners() {
        document.getElementById('game-board').addEventListener('click', (e) => {
          if (this.isMultiplayer && !this.isMyTurn) return;
          const btn = e.target.closest('.card');
          if (btn) this.clickCard(parseInt(btn.dataset.index));
        });

        document.getElementById('btn-new-game').addEventListener('click', () => { document.getElementById('themeOverlay').style.display='flex'; });
        document.getElementById('btn-quit').addEventListener('click', () => this.quit());
        document.getElementById('modal-btn-new').addEventListener('click', () => { document.getElementById('win-modal').style.display='none'; document.getElementById('themeOverlay').style.display='flex'; });
        document.getElementById('modal-btn-quit').addEventListener('click', () => this.quit());
      }

      clickCard(index) {
        if (this.isProcessing || this.matched.has(index) || this.flipped.includes(index)) return;

        this.flipped.push(index);
        this.render();

        if (this.flipped.length === 2) {
          this.isProcessing = true;
          this.moves++;

          setTimeout(() => this.checkMatch(), 800);
        }
      }

      checkMatch() {
        const [idx1, idx2] = this.flipped;
        const match = this.cards[idx1].id === this.cards[idx2].id;

        if (match) {
          this.matched.add(idx1);
          this.matched.add(idx2);
          this.myScore += 100;

          if (this.isMultiplayer) {
            touchBridge.broadcastMove({ type: 'match', indices: [idx1, idx2] });
          }

          if (this.matched.size === this.cards.length) {
            this.gameWon();
          } else {
            this.flipped = [];
            this.isProcessing = false;
            this.render();
          }
        } else {
          this.myScore -= 5;
          if (this.isMultiplayer) {
            this.isMyTurn = false;
            touchBridge.broadcastMove({ type: 'miss', indices: [idx1, idx2] });
          }

          setTimeout(() => {
            this.flipped = [];
            this.isProcessing = false;
            this.render();
          }, 1200);
        }

        this.updateStatus();
      }

      gameWon() {
        const time = Math.floor((Date.now() - this.startTime) / 1000);
        const score = Math.max(0, this.myScore);

        touchBridge.submitResult({
          pairs: this.matched.size,
          moves: this.moves,
          time,
          score
        });

        document.getElementById('modal-pairs').textContent = this.matched.size;
        document.getElementById('modal-moves').textContent = this.moves;
        document.getElementById('modal-time').textContent = `${time}s`;
        document.getElementById('modal-score').textContent = score;

        document.getElementById('win-modal').classList.add('active');
      }

      quit() {
        if (confirm('Deseja sair do jogo?')) {
          touchBridge.requestClose();
        }
      }

      updateStatus() {
        const status = document.querySelector('.g-status');
        const playerScoreEl = document.querySelector('#player-score .player-score-value');
        const opponentScoreEl = document.querySelector('#opponent-score .player-score-value');

        if (this.isMultiplayer) {
          status.classList.add('multiplayer');
          const turn = this.isMyTurn ? 'Sua vez' : 'Vez do oponente';
          status.textContent = turn;
        } else {
          status.textContent = `Movimentos: ${this.moves}`;
        }

        playerScoreEl.textContent = Math.max(0, this.myScore);
        opponentScoreEl.textContent = Math.max(0, this.opponentScore);
      }

      setupBridge() {
        touchBridge.onOpponentMove = (move) => {
          if (move.type === 'match') {
            this.matched.add(move.indices[0]);
            this.matched.add(move.indices[1]);
            this.opponentScore += 100;

            if (this.matched.size === this.cards.length) {
              this.opponentWins();
            }
          } else if (move.type === 'miss') {
            this.isMyTurn = true;
          }

          this.updateStatus();
          this.render();
        };

        touchBridge.onOpponentDisconnected = () => {
          alert('Oponente desconectou!');
          this.initGame();
        };
      }

      opponentWins() {
        alert('Oponente encontrou todos os pares!');
        this.initGame();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new MemoryGame();
    });
  </script>
