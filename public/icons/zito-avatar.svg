<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="crown-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#DAA520"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="94"/>
    </clipPath>
  </defs>

  <!-- Border ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#ff6b35" stroke-width="2" stroke-opacity="0.3"/>
  <!-- Background -->
  <circle cx="100" cy="100" r="94" fill="url(#bg)"/>

  <!-- All content clipped -->
  <g clip-path="url(#circle-clip)">

    <!-- Silhouette head -->
    <circle cx="100" cy="95" r="26" fill="#2a2a44"/>

    <!-- Silhouette body -->
    <ellipse cx="100" cy="170" rx="46" ry="40" fill="#2a2a44"/>

    <!-- Crown overlapping top of head -->
    <!-- Crown base bar -->
    <rect x="76" y="70" width="48" height="8" rx="2" fill="url(#crown-gold)"/>

    <!-- Crown 3 points -->
    <polygon points="78,70 86,55 94,70" fill="url(#crown-gold)"/>
    <polygon points="92,70 100,49 108,70" fill="url(#crown-gold)"/>
    <polygon points="106,70 114,55 122,70" fill="url(#crown-gold)"/>

    <!-- Jewels on tips -->
    <circle cx="86" cy="58" r="2.5" fill="#E74C3C"/>
    <circle cx="100" cy="53" r="3" fill="#3498DB"/>
    <circle cx="114" cy="58" r="2.5" fill="#2ECC71"/>

  </g>
</svg>