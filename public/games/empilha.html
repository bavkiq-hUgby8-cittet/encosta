<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Empilha — Touch?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a24;--b1:rgba(255,255,255,.08);
  --t1:#f5f5f7;--t2:#8888a0;--t3:#555568;
  --ac:#ff6b35;--ac2:#ff8f65;--ok:#34d399;--err:#f87171;
}
html,body{height:100%;width:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

.g-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;border-bottom:1px solid var(--b1);flex-shrink:0}
.g-status{padding:.3rem .7rem;background:var(--s1);border-radius:16px;font-size:.7rem;color:var(--t2)}
.g-score{font-size:.85rem;font-weight:700;color:var(--ac)}

.g-board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0;overflow:hidden;position:relative;cursor:pointer}

.g-footer{display:flex;gap:.5rem;padding:.8rem 1rem;border-top:1px solid var(--b1);flex-shrink:0}
.g-btn{flex:1;padding:.7rem;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:.8rem;font-family:inherit;transition:opacity .15s,transform .1s}
.g-btn:active{opacity:.85;transform:scale(.97)}
.g-btn.primary{background:var(--ac);color:#fff}
.g-btn.secondary{background:var(--s1);color:var(--t2);border:1px solid var(--b1)}

.g-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;background:var(--s2);border:1px solid var(--b1);border-radius:12px;font-size:.75rem;color:var(--t1);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.g-toast.show{opacity:1}

/* === EMPILHA STYLES === */
canvas{display:block;width:100%;height:100%}

.start-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,15,.7);backdrop-filter:blur(4px)}
.start-card{text-align:center;padding:2rem}
.start-icon{width:80px;height:80px;margin:0 auto 1rem}
.start-title{font-size:1.5rem;font-weight:800;margin-bottom:.4rem}
.start-sub{font-size:.75rem;color:var(--t2);margin-bottom:1rem;line-height:1.4}
.start-btn{padding:.9rem 2.5rem;border:none;border-radius:14px;background:var(--ac);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit}
.start-btn:active{transform:scale(.97)}

.score-popup{position:absolute;font-size:1.2rem;font-weight:800;pointer-events:none;z-index:5;animation:floatUp 1s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.6)}}

.combo-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;pointer-events:none;z-index:5;opacity:0}
.combo-text.show{animation:comboFlash .8s ease-out forwards}
@keyframes comboFlash{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}30%{transform:translate(-50%,-50%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}

/* Result overlay */
.result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:2rem 1.5rem;text-align:center;max-width:300px;width:90%}
.result-title{font-size:1.4rem;font-weight:800;margin-bottom:.5rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:1rem 0}
.result-stat{background:var(--s2);border-radius:8px;padding:.6rem}
.result-stat-label{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.result-stat-value{font-size:1rem;font-weight:700;color:var(--ac)}
.result-btn{width:100%;padding:.8rem;border:none;border-radius:12px;background:var(--ac);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit;margin-top:.5rem}
.result-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="g-header">
  <div class="g-status" id="gStatus">Empilha</div>
  <div class="g-score" id="gScore">0 pts</div>
</div>

<div class="g-board" id="gBoard">
  <canvas id="gameCanvas"></canvas>
  <div class="start-overlay" id="startOverlay">
    <div class="start-card">
      <div class="start-icon">
        <svg viewBox="0 0 80 80" fill="none">
          <rect x="10" y="60" width="60" height="10" rx="2" fill="#ff6b35" opacity=".9"/>
          <rect x="15" y="48" width="50" height="10" rx="2" fill="#ff8f65" opacity=".8"/>
          <rect x="20" y="36" width="40" height="10" rx="2" fill="#ffab8a" opacity=".7"/>
          <rect x="25" y="24" width="30" height="10" rx="2" fill="#ffc5aa" opacity=".6"/>
          <rect x="30" y="12" width="20" height="10" rx="2" fill="#ffddc8" opacity=".5"/>
        </svg>
      </div>
      <div class="start-title">Empilha</div>
      <div class="start-sub">Toque para soltar o bloco.<br>Alinhe perfeitamente para manter o tamanho!</div>
      <button class="start-btn" onclick="startGame()">Jogar</button>
    </div>
  </div>
  <div class="combo-text" id="comboText"></div>
</div>

<div class="g-footer">
  <button class="g-btn secondary" onclick="doSurrender()">Desistir</button>
  <button class="g-btn primary" onclick="doNewGame()">Novo Jogo</button>
</div>

<div class="g-toast" id="gToast"></div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stats" id="resultStats"></div>
    <button class="result-btn" onclick="doNewGame()">Jogar Novamente</button>
  </div>
</div>

<script src="/games/core/bridge.js"></script>
<script>
'use strict';

var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');

var G={
  score:0,moves:[],startTime:Date.now(),
  isMultiplayer:false,myTurn:true,
  phase:'idle',gameOver:false,
  blocks:[],currentBlock:null,
  speed:2,direction:1,
  combo:0,maxCombo:0,
  perfectCount:0,
  animFrame:null,
  baseWidth:0,blockHeight:0
};

var COLORS=[
  ['#ff6b35','#ff8f65'],['#3b82f6','#60a5fa'],['#22c55e','#4ade80'],
  ['#a855f7','#c084fc'],['#ec4899','#f472b6'],['#06b6d4','#22d3ee'],
  ['#eab308','#facc15'],['#f97316','#fb923c']
];

function setStatus(t){document.getElementById('gStatus').textContent=t}
function setScore(n){G.score=n;document.getElementById('gScore').textContent=n+' pts'}
function toast(m){var t=document.getElementById('gToast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

function resizeCanvas(){
  var r=canvas.parentElement.getBoundingClientRect();
  canvas.width=r.width*window.devicePixelRatio;
  canvas.height=r.height*window.devicePixelRatio;
  canvas.style.width=r.width+'px';
  canvas.style.height=r.height+'px';
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  G.baseWidth=r.width*0.45;
  G.blockHeight=r.height*0.04;
}

function getColor(i){return COLORS[i%COLORS.length]}

function initGame(){
  G.score=0;G.combo=0;G.maxCombo=0;G.perfectCount=0;
  G.blocks=[];G.currentBlock=null;G.speed=2;G.direction=1;
  G.gameOver=false;G.phase='idle';G.moves=[];G.startTime=Date.now();
  clearInterval(G.animFrame);
  setScore(0);setStatus('Empilha');
  document.getElementById('resultOverlay').classList.remove('show');
  document.getElementById('startOverlay').style.display='flex';
  resizeCanvas();
  drawScene();
}

function startGame(){
  document.getElementById('startOverlay').style.display='none';
  G.phase='playing';
  setStatus('Jogando');

  var cw=canvas.width/window.devicePixelRatio;
  var ch=canvas.height/window.devicePixelRatio;

  G.blocks.push({
    x:(cw-G.baseWidth)/2,
    y:ch-G.blockHeight,
    w:G.baseWidth,
    h:G.blockHeight,
    color:getColor(0)
  });

  spawnBlock();
  gameLoop();
}

function spawnBlock(){
  var cw=canvas.width/window.devicePixelRatio;
  var ch=canvas.height/window.devicePixelRatio;
  var lastBlock=G.blocks[G.blocks.length-1];
  var w=lastBlock.w;
  var y=ch-(G.blocks.length+1)*G.blockHeight;

  if(y<ch*0.3){
    for(var i=0;i<G.blocks.length;i++){
      G.blocks[i].y+=G.blockHeight;
    }
    y+=G.blockHeight;
  }

  G.currentBlock={
    x:G.direction>0?-w:cw,
    y:y,
    w:w,
    h:G.blockHeight,
    color:getColor(G.blocks.length)
  };
  G.speed=Math.min(2+G.blocks.length*0.15,8);
}

function placeBlock(){
  if(!G.currentBlock||G.gameOver) return;
  var cur=G.currentBlock;
  var last=G.blocks[G.blocks.length-1];

  var overlapStart=Math.max(cur.x,last.x);
  var overlapEnd=Math.min(cur.x+cur.w,last.x+last.w);
  var overlapW=overlapEnd-overlapStart;

  if(overlapW<=0){
    endGame();
    return;
  }

  var perfectThreshold=cur.w*0.05;
  var isPerfect=Math.abs(cur.x-last.x)<perfectThreshold;

  if(isPerfect){
    overlapStart=last.x;
    overlapW=last.w;
    G.combo++;
    G.perfectCount++;
    var pts=10+G.combo*5;
    G.score+=pts;
    if(G.combo>G.maxCombo) G.maxCombo=G.combo;
    showCombo();
  } else {
    G.combo=0;
    G.score+=10;
  }

  G.blocks.push({
    x:overlapStart,
    y:cur.y,
    w:overlapW,
    h:cur.h,
    color:cur.color
  });

  G.moves.push({block:G.blocks.length-1,x:cur.x,overlap:overlapW,perfect:isPerfect,t:Date.now()});
  setScore(G.score);
  setStatus('Andar '+(G.blocks.length-1));

  G.direction*=-1;
  spawnBlock();
}

function showCombo(){
  if(G.combo<2) return;
  var el=document.getElementById('comboText');
  var msg=G.combo>=5?'INCRIVEL x'+G.combo:G.combo>=3?'COMBO x'+G.combo:'Perfeito!';
  el.textContent=msg;
  el.style.color=G.combo>=5?'var(--ok)':G.combo>=3?'var(--ac)':'var(--t1)';
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  if(G.combo>=3) toast(msg);
}

function endGame(){
  G.gameOver=true;G.phase='idle';
  cancelAnimationFrame(G.animFrame);
  setStatus('Fim de jogo');

  var floors=G.blocks.length-1;
  var titleEl=document.getElementById('resultTitle');
  var statsEl=document.getElementById('resultStats');

  titleEl.textContent=floors>=20?'Mestre Construtor!':floors>=10?'Boa torre!':'Tente de novo';
  titleEl.style.color=floors>=20?'var(--ok)':floors>=10?'var(--ac)':'var(--t2)';

  statsEl.innerHTML=
    '<div class="result-stat"><div class="result-stat-label">Andares</div><div class="result-stat-value">'+floors+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Pontos</div><div class="result-stat-value">'+G.score+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Perfeitos</div><div class="result-stat-value" style="color:var(--ok)">'+G.perfectCount+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Max Combo</div><div class="result-stat-value">'+G.maxCombo+'x</div></div>';

  document.getElementById('resultOverlay').classList.add('show');

  touchBridge.submitResult({
    winner:touchBridge.userId,
    score:G.score,
    duration:Math.floor((Date.now()-G.startTime)/1000),
    moves:G.moves,
    surrendered:false
  });
}

function gameLoop(){
  if(G.gameOver) return;
  update();
  drawScene();
  G.animFrame=requestAnimationFrame(gameLoop);
}

function update(){
  if(!G.currentBlock) return;
  var cw=canvas.width/window.devicePixelRatio;
  G.currentBlock.x+=G.speed*G.direction;
  if(G.currentBlock.x+G.currentBlock.w>cw){
    G.currentBlock.x=cw-G.currentBlock.w;
    G.direction=-1;
  }
  if(G.currentBlock.x<0){
    G.currentBlock.x=0;
    G.direction=1;
  }
}

function drawScene(){
  var cw=canvas.width/window.devicePixelRatio;
  var ch=canvas.height/window.devicePixelRatio;
  ctx.clearRect(0,0,cw,ch);

  for(var i=0;i<G.blocks.length;i++){
    drawBlock(G.blocks[i]);
  }
  if(G.currentBlock){
    drawBlock(G.currentBlock);
  }
}

function drawBlock(b){
  var grad=ctx.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
  grad.addColorStop(0,b.color[0]);
  grad.addColorStop(1,b.color[1]);
  ctx.fillStyle=grad;

  var r=3;
  ctx.beginPath();
  ctx.moveTo(b.x+r,b.y);
  ctx.lineTo(b.x+b.w-r,b.y);
  ctx.quadraticCurveTo(b.x+b.w,b.y,b.x+b.w,b.y+r);
  ctx.lineTo(b.x+b.w,b.y+b.h-r);
  ctx.quadraticCurveTo(b.x+b.w,b.y+b.h,b.x+b.w-r,b.y+b.h);
  ctx.lineTo(b.x+r,b.y+b.h);
  ctx.quadraticCurveTo(b.x,b.y+b.h,b.x,b.y+b.h-r);
  ctx.lineTo(b.x,b.y+r);
  ctx.quadraticCurveTo(b.x,b.y,b.x+r,b.y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle='rgba(255,255,255,.1)';
  ctx.lineWidth=1;
  ctx.stroke();
}

document.getElementById('gBoard').addEventListener('click',function(e){
  if(e.target.closest('.start-overlay')||e.target.closest('.g-footer')) return;
  if(G.phase==='playing') placeBlock();
});
document.getElementById('gBoard').addEventListener('touchstart',function(e){
  if(e.target.closest('.start-overlay')||e.target.closest('.g-footer')) return;
  if(G.phase==='playing'){e.preventDefault();placeBlock()}
},{passive:false});

function doSurrender(){
  if(G.gameOver||G.phase==='idle') return;
  if(!confirm('Desistir do jogo?')) return;
  G.gameOver=true;cancelAnimationFrame(G.animFrame);
  touchBridge.submitResult({winner:null,score:G.score,duration:Math.floor((Date.now()-G.startTime)/1000),moves:G.moves,surrendered:true});
  toast('Voce desistiu');initGame();
}

function doNewGame(){
  cancelAnimationFrame(G.animFrame);
  document.getElementById('resultOverlay').classList.remove('show');
  initGame();
}

window.addEventListener('resize',function(){
  if(G.phase!=='idle') return;
  resizeCanvas();drawScene();
});

window.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
