<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Revelacao</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;width:100vw;height:100vh;height:100dvh}
#tapScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
#tapScreen .circle{width:140px;height:140px;border-radius:50%;border:3px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;animation:glow 2s ease-in-out infinite}
#tapScreen .circle span{font-size:1.1rem;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.08em;text-align:center;line-height:1.3}
#tapScreen .hint{font-size:.85rem;color:rgba(255,255,255,.4);margin-top:1rem}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,255,255,.1)}50%{box-shadow:0 0 40px rgba(255,255,255,.25)}}
#countScreen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;background:#000;display:none;align-items:center;justify-content:center}
#countScreen span{font-size:10rem;font-weight:900;color:#fff;text-shadow:0 0 60px rgba(255,255,255,.5)}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:1;display:none}
#nameBox{position:fixed;top:0;left:0;width:100%;height:100%;z-index:8;display:none;flex-direction:column;align-items:center;justify-content:center}
#nameBox div{background:rgba(0,0,0,.5);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:1.5rem 3rem;border-radius:16px;text-align:center}
#nameBox h1{font-size:2.8rem;font-weight:900;color:#fff;text-shadow:0 0 30px rgba(255,255,255,.4)}
#nameBox p{font-size:1.2rem;font-weight:700;margin-top:.4rem}
#closeBtn{position:fixed;top:12px;right:12px;z-index:20;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:1rem;cursor:pointer;display:none;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="tapScreen">
  <div class="circle"><span>Toque para revelar</span></div>
  <div class="hint">Preparado?</div>
</div>

<div id="countScreen"><span id="num">5</span></div>

<video id="vid" playsinline webkit-playsinline muted preload="auto"></video>

<div id="nameBox"><div><h1 id="bname"></h1><p id="blabel"></p></div></div>

<button id="closeBtn" onclick="window.history.back()">X</button>

<script>
var params=new URLSearchParams(window.location.search);
var eventId=params.get('event')||params.get('e')||'';
var revealData=null;

if(!eventId){
  document.getElementById('tapScreen').innerHTML='<div style="color:#ef4444;font-size:1.2rem;font-weight:600">Evento nao encontrado</div>';
}else{
  // Fetch data immediately
  fetch('/api/event/'+eventId+'/charevela')
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.config && d.config.revealed && d.config.answer){
        var a=d.config.answer;
        revealData={
          videoSrc: a==='optionA'?'/reveal-boy-lite.mp4':'/reveal-girl-lite.mp4',
          babyName: d.config.babyName||'',
          label: a==='optionA'?(d.config.optionA||'Menino'):(d.config.optionB||'Menina'),
          color: a==='optionA'?(d.config.colorA||'#3b82f6'):(d.config.colorB||'#ec4899')
        };
        // Preload video
        var v=document.getElementById('vid');
        v.src=revealData.videoSrc;
        v.load();
      }else{
        // Not revealed yet - show waiting, connect socket
        document.getElementById('tapScreen').innerHTML='<div style="font-size:1.2rem;color:rgba(255,255,255,.7);font-weight:600;animation:pulse 1.5s infinite">Aguardando a revelacao...</div>';
        loadSocket();
      }
    })
    .catch(function(){
      document.getElementById('tapScreen').innerHTML='<div style="color:#ef4444;font-size:1.2rem;font-weight:600">Erro ao carregar</div>';
    });
}

function loadSocket(){
  var s=document.createElement('script');
  s.src='/socket.io/socket.io.js';
  s.onload=function(){
    var sock=io();
    sock.emit('join-event-room',eventId);
    sock.on('charevela-reveal',function(data){
      if(data.eventId!==eventId)return;
      revealData={
        videoSrc: data.answer==='optionA'?'/reveal-boy-lite.mp4':'/reveal-girl-lite.mp4',
        babyName: data.babyName||'',
        label: data.answerLabel||'???',
        color: data.color||'#ec4899'
      };
      var v=document.getElementById('vid');
      v.src=revealData.videoSrc;
      v.load();
      // Show tap button
      document.getElementById('tapScreen').innerHTML='<div class="circle"><span>Toque para revelar</span></div><div class="hint">Preparado?</div>';
    });
  };
  document.body.appendChild(s);
}

// TAP = start everything (guarantees user gesture for video)
document.getElementById('tapScreen').addEventListener('click',function(){
  if(!revealData)return;
  // Hide tap screen
  this.style.display='none';
  // Show countdown
  var cs=document.getElementById('countScreen');
  cs.style.display='flex';
  var numEl=document.getElementById('num');
  var color=revealData.color;

  if(navigator.vibrate)navigator.vibrate([200,100,200]);

  var c=5;
  var t=setInterval(function(){
    c--;
    if(c>0){
      numEl.textContent=c;
      numEl.style.animation='pulse .5s ease-in-out';
      if(c<=2)numEl.style.color=color;
      if(navigator.vibrate)navigator.vibrate(c<=2?100:50);
    }else{
      clearInterval(t);
      // Hide countdown, show and play video
      cs.style.display='none';
      var vid=document.getElementById('vid');
      vid.style.display='block';
      vid.currentTime=0;
      vid.muted=true;
      vid.play().then(function(){
        try{vid.muted=false}catch(e){}
      }).catch(function(e){
        console.warn('play err:',e.message);
      });
      if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);

      // Show name ONLY after video ends
      vid.onended=function(){
        vid.style.display='none';
        var nb=document.getElementById('nameBox');
        if(revealData.babyName)document.getElementById('bname').textContent=revealData.babyName;
        var lbl=document.getElementById('blabel');
        lbl.textContent=revealData.label;
        lbl.style.color=revealData.color;
        nb.style.display='flex';
        document.body.style.background='radial-gradient(circle,'+revealData.color+'33,#000)';
        document.getElementById('closeBtn').style.display='flex';
      };
    }
  },1000);
});
</script>
</body>
</html>
