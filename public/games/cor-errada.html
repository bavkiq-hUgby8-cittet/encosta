<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>Cor Errada — Touch?</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a24;--b1:rgba(255,255,255,.08);
  --t1:#f5f5f7;--t2:#8888a0;--t3:#555568;
  --ac:#ff6b35;--ac2:#ff8f65;--ok:#34d399;--err:#f87171;
}
html,body{height:100%;width:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;-webkit-user-select:none;user-select:none}
body{display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

.g-header{display:flex;justify-content:space-between;align-items:center;padding:.8rem 1rem;border-bottom:1px solid var(--b1);flex-shrink:0}
.g-status{padding:.3rem .7rem;background:var(--s1);border-radius:16px;font-size:.7rem;color:var(--t2)}
.g-score{font-size:.85rem;font-weight:700;color:var(--ac)}

.g-board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow:hidden;position:relative}

.g-footer{display:flex;gap:.5rem;padding:.8rem 1rem;border-top:1px solid var(--b1);flex-shrink:0}
.g-btn{flex:1;padding:.7rem;border:none;border-radius:12px;font-weight:600;cursor:pointer;font-size:.8rem;font-family:inherit;transition:opacity .15s,transform .1s}
.g-btn:active{opacity:.85;transform:scale(.97)}
.g-btn.primary{background:var(--ac);color:#fff}
.g-btn.secondary{background:var(--s1);color:var(--t2);border:1px solid var(--b1)}

.g-toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:.6rem 1.2rem;background:var(--s2);border:1px solid var(--b1);border-radius:12px;font-size:.75rem;color:var(--t1);z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.g-toast.show{opacity:1}

/* === COR ERRADA STYLES === */
.stats-row{display:flex;gap:.6rem;margin-bottom:1rem;width:100%;max-width:360px}
.stat-card{flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:.5rem;text-align:center}
.stat-label{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:1rem;font-weight:700}
.stat-value.green{color:var(--ok)}
.stat-value.red{color:var(--err)}
.stat-value.accent{color:var(--ac)}

.timer-bar{width:100%;max-width:360px;height:4px;background:var(--s2);border-radius:2px;margin-bottom:1.2rem;overflow:hidden}
.timer-fill{height:100%;background:var(--ac);border-radius:2px;transition:width .1s linear}
.timer-fill.warning{background:var(--err)}

.instruction{font-size:.7rem;color:var(--t3);margin-bottom:.6rem;text-align:center}

.word-display{margin-bottom:1.5rem;text-align:center}
.the-word{font-size:3rem;font-weight:900;letter-spacing:2px;line-height:1.2;transition:transform .15s}
.the-word.shake{animation:shake .3s ease}
.the-word.pop{animation:pop .2s ease}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pop{0%{transform:scale(.8);opacity:.5}100%{transform:scale(1);opacity:1}}

.color-options{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;width:100%;max-width:360px}
.color-btn{padding:1rem;border:2px solid var(--b1);border-radius:14px;background:var(--s1);color:var(--t1);font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;transition:all .15s;min-height:56px;display:flex;align-items:center;justify-content:center;gap:.5rem}
.color-btn:active{transform:scale(.95)}
.color-btn.correct{border-color:var(--ok);background:rgba(52,211,153,.1);animation:correctFlash .3s ease}
.color-btn.wrong{border-color:var(--err);background:rgba(248,113,113,.1);animation:shake .3s ease}

@keyframes correctFlash{0%{box-shadow:0 0 0 0 rgba(52,211,153,.4)}100%{box-shadow:0 0 20px 5px rgba(52,211,153,0)}}

.color-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}

.combo-display{font-size:.7rem;color:var(--ac);margin-top:.6rem;height:1rem;transition:opacity .2s}
.combo-display.big{font-size:.9rem;color:var(--ok);font-weight:700}

/* Start screen */
.start-screen{text-align:center}
.start-icon{width:80px;height:80px;margin:0 auto 1rem}
.start-title{font-size:1.3rem;font-weight:800;margin-bottom:.4rem}
.start-sub{font-size:.75rem;color:var(--t2);margin-bottom:.3rem;line-height:1.4}
.start-example{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:1rem;margin:1rem 0;text-align:center}
.start-example-word{font-size:2rem;font-weight:900;margin-bottom:.3rem}
.start-example-hint{font-size:.65rem;color:var(--t3)}
.start-btn{padding:.9rem 2rem;border:none;border-radius:14px;background:var(--ac);color:#fff;font-weight:700;font-size:.9rem;cursor:pointer;font-family:inherit;margin-top:.5rem}
.start-btn:active{transform:scale(.97)}

/* Result overlay */
.result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,10,15,.85);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:50;opacity:0;pointer-events:none;transition:opacity .3s}
.result-overlay.show{opacity:1;pointer-events:all}
.result-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:2rem 1.5rem;text-align:center;max-width:300px;width:90%}
.result-title{font-size:1.4rem;font-weight:800;margin-bottom:.5rem}
.result-stats{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin:1rem 0}
.result-stat{background:var(--s2);border-radius:8px;padding:.6rem}
.result-stat-label{font-size:.55rem;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.result-stat-value{font-size:1rem;font-weight:700;color:var(--ac)}
.result-btn{width:100%;padding:.8rem;border:none;border-radius:12px;background:var(--ac);color:#fff;font-weight:700;font-size:.85rem;cursor:pointer;font-family:inherit;margin-top:.5rem}
.result-btn:active{transform:scale(.97)}
</style>
</head>
<body>
<div class="g-header">
  <div class="g-status" id="gStatus">Cor Errada</div>
  <div class="g-score" id="gScore">0 pts</div>
</div>

<div class="g-board" id="gBoard"></div>

<div class="g-footer">
  <button class="g-btn secondary" onclick="doSurrender()">Desistir</button>
  <button class="g-btn primary" onclick="doNewGame()">Novo Jogo</button>
</div>

<div class="g-toast" id="gToast"></div>
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-stats" id="resultStats"></div>
    <button class="result-btn" onclick="doNewGame()">Jogar Novamente</button>
  </div>
</div>

<script src="/games/core/bridge.js"></script>
<script>
'use strict';

var COLORS=[
  {name:'Vermelho',hex:'#ef4444'},
  {name:'Azul',hex:'#3b82f6'},
  {name:'Verde',hex:'#22c55e'},
  {name:'Amarelo',hex:'#eab308'},
  {name:'Rosa',hex:'#ec4899'},
  {name:'Roxo',hex:'#a855f7'},
  {name:'Laranja',hex:'#f97316'},
  {name:'Ciano',hex:'#06b6d4'}
];

var G={
  score:0,moves:[],startTime:Date.now(),
  isMultiplayer:!!(typeof touchBridge!=='undefined'&&touchBridge.opponentId),
  myTurn:true,phase:'start',
  correct:0,wrong:0,combo:0,maxCombo:0,
  timeLeft:30,totalTime:30,timerInterval:null,
  currentWord:null,currentDisplayColor:null,correctAnswer:null,
  options:[],gameOver:false,level:1
};

function setStatus(t){document.getElementById('gStatus').textContent=t}
function setScore(n){G.score=n;document.getElementById('gScore').textContent=n+' pts'}
function toast(m){var t=document.getElementById('gToast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1800)}

var board=document.getElementById('gBoard');

function initGame(){
  G.score=0;G.correct=0;G.wrong=0;G.combo=0;G.maxCombo=0;
  G.timeLeft=G.totalTime;G.gameOver=false;G.level=1;G.moves=[];G.startTime=Date.now();
  clearInterval(G.timerInterval);
  document.getElementById('resultOverlay').classList.remove('show');
  setScore(0);

  if(G.phase==='start'){
    showStartScreen();
  } else {
    startPlaying();
  }
}

function showStartScreen(){
  G.phase='start';
  setStatus('Cor Errada');
  var exColor=COLORS[0];
  var exDisplay=COLORS[1];
  board.innerHTML=
    '<div class="start-screen">'+
      '<div class="start-icon"><svg viewBox="0 0 80 80" fill="none">'+
        '<circle cx="40" cy="40" r="35" stroke="#ff6b35" stroke-width="2.5"/>'+
        '<circle cx="25" cy="32" r="8" fill="#ef4444" opacity=".8"/>'+
        '<circle cx="40" cy="28" r="8" fill="#3b82f6" opacity=".8"/>'+
        '<circle cx="55" cy="32" r="8" fill="#22c55e" opacity=".8"/>'+
        '<circle cx="32" cy="48" r="8" fill="#eab308" opacity=".8"/>'+
        '<circle cx="48" cy="48" r="8" fill="#a855f7" opacity=".8"/>'+
      '</svg></div>'+
      '<div class="start-title">Cor Errada</div>'+
      '<div class="start-sub">A palavra diz uma cor, mas esta pintada de outra.<br>Toque na COR da tinta, nao na palavra!</div>'+
      '<div class="start-example">'+
        '<div class="start-example-word" style="color:'+exDisplay.hex+'">'+exColor.name+'</div>'+
        '<div class="start-example-hint">A palavra diz "'+exColor.name+'" mas esta pintada de '+exDisplay.name+'.<br>Resposta certa: '+exDisplay.name+'!</div>'+
      '</div>'+
      '<button class="start-btn" onclick="startPlaying()">Comecar</button>'+
    '</div>';
}

function startPlaying(){
  G.phase='playing';
  G.timeLeft=G.totalTime;
  setStatus('Jogando');
  G.timerInterval=setInterval(tickTimer,100);
  nextWord();
}

function tickTimer(){
  G.timeLeft-=0.1;
  if(G.timeLeft<=0){
    G.timeLeft=0;
    clearInterval(G.timerInterval);
    endGame();
    return;
  }
  var fill=document.getElementById('timerFill');
  if(fill){
    var pct=(G.timeLeft/G.totalTime)*100;
    fill.style.width=pct+'%';
    if(pct<25) fill.classList.add('warning');
    else fill.classList.remove('warning');
  }
}

function pickRandom(arr,exclude){
  var filtered=exclude?arr.filter(function(c){return c.name!==exclude.name}):arr;
  return filtered[Math.floor(Math.random()*filtered.length)];
}

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t}
  return a;
}

function nextWord(){
  if(G.gameOver) return;
  var wordColor=COLORS[Math.floor(Math.random()*COLORS.length)];
  var displayColor=pickRandom(COLORS,wordColor);
  G.currentWord=wordColor;
  G.currentDisplayColor=displayColor;
  G.correctAnswer=displayColor;

  var opts=[displayColor];
  while(opts.length<4){
    var c=COLORS[Math.floor(Math.random()*COLORS.length)];
    if(!opts.some(function(o){return o.name===c.name})){
      opts.push(c);
    }
  }
  G.options=shuffle(opts);

  renderGame();
}

function renderGame(){
  var comboClass=G.combo>=5?'big':'';
  var comboText=G.combo>=3?'Combo x'+G.combo+'!':'';

  var html=
    '<div class="stats-row">'+
      '<div class="stat-card"><div class="stat-label">Acertos</div><div class="stat-value green">'+G.correct+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Erros</div><div class="stat-value red">'+G.wrong+'</div></div>'+
      '<div class="stat-card"><div class="stat-label">Combo</div><div class="stat-value accent">'+G.combo+'x</div></div>'+
      '<div class="stat-card"><div class="stat-label">Tempo</div><div class="stat-value">'+Math.ceil(G.timeLeft)+'s</div></div>'+
    '</div>'+
    '<div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:'+(G.timeLeft/G.totalTime*100)+'%"></div></div>'+
    '<div class="instruction">Qual e a COR da tinta?</div>'+
    '<div class="word-display"><div class="the-word pop" id="theWord" style="color:'+G.currentDisplayColor.hex+'">'+G.currentWord.name+'</div></div>'+
    '<div class="combo-display '+comboClass+'" id="comboText">'+comboText+'</div>'+
    '<div class="color-options" id="colorOpts">';

  for(var i=0;i<G.options.length;i++){
    html+='<button class="color-btn" data-idx="'+i+'" onclick="pickColor('+i+')">'+
      '<div class="color-dot" style="background:'+G.options[i].hex+'"></div>'+
      G.options[i].name+'</button>';
  }
  html+='</div>';
  board.innerHTML=html;
}

function pickColor(idx){
  if(G.gameOver) return;
  var chosen=G.options[idx];
  var isCorrect=chosen.name===G.correctAnswer.name;
  var btns=document.querySelectorAll('.color-btn');

  G.moves.push({word:G.currentWord.name,display:G.currentDisplayColor.name,chosen:chosen.name,correct:isCorrect,t:Date.now()});

  if(isCorrect){
    G.correct++;
    G.combo++;
    if(G.combo>G.maxCombo) G.maxCombo=G.combo;
    var pts=10+(G.combo>1?(G.combo-1)*5:0);
    G.score+=pts;
    setScore(G.score);
    btns[idx].classList.add('correct');
    if(G.combo>=3) toast('Combo x'+G.combo+'! +'+pts);
  } else {
    G.wrong++;
    G.combo=0;
    G.timeLeft=Math.max(0,G.timeLeft-2);
    btns[idx].classList.add('wrong');
    toast('-2 segundos!');
    for(var i=0;i<btns.length;i++){
      if(G.options[i].name===G.correctAnswer.name) btns[i].classList.add('correct');
    }
  }

  setTimeout(nextWord,isCorrect?200:600);
}

function endGame(){
  G.gameOver=true;G.phase='start';
  clearInterval(G.timerInterval);

  var titleEl=document.getElementById('resultTitle');
  var statsEl=document.getElementById('resultStats');
  var pct=G.correct+G.wrong>0?Math.round(G.correct/(G.correct+G.wrong)*100):0;

  titleEl.textContent=pct>=80?'Incrivel!':pct>=60?'Muito bem!':'Continue praticando';
  titleEl.style.color=pct>=80?'var(--ok)':pct>=60?'var(--ac)':'var(--t2)';

  statsEl.innerHTML=
    '<div class="result-stat"><div class="result-stat-label">Pontos</div><div class="result-stat-value">'+G.score+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Precisao</div><div class="result-stat-value">'+pct+'%</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Acertos</div><div class="result-stat-value" style="color:var(--ok)">'+G.correct+'</div></div>'+
    '<div class="result-stat"><div class="result-stat-label">Max Combo</div><div class="result-stat-value">'+G.maxCombo+'x</div></div>';

  document.getElementById('resultOverlay').classList.add('show');

  touchBridge.submitResult({
    winner:touchBridge.userId,
    score:G.score,
    duration:G.totalTime,
    moves:G.moves,
    surrendered:false
  });
}

function doSurrender(){
  if(G.gameOver||G.phase==='start') return;
  if(!confirm('Desistir do jogo?')) return;
  G.gameOver=true;clearInterval(G.timerInterval);
  touchBridge.submitResult({winner:touchBridge.opponentId||null,score:G.score,duration:Math.floor((Date.now()-G.startTime)/1000),moves:G.moves,surrendered:true});
  toast('Voce desistiu');
  G.phase='start';showStartScreen();
}

function doNewGame(){
  clearInterval(G.timerInterval);
  document.getElementById('resultOverlay').classList.remove('show');
  G.phase='start';initGame();
}

if(G.isMultiplayer){
  touchBridge.onOpponentMove=function(m){};
  touchBridge.onOpponentDisconnected=function(){setStatus('Oponente saiu');toast('Oponente desconectou')};
}

window.addEventListener('DOMContentLoaded',initGame);
</script>
</body>
</html>
