<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#050508">
<title>Touch? - Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
  background:#050508;
  color:#f0f0f5;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem;
  text-align:center;
  overflow:hidden;
}
.offline-container{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.5rem;
  max-width:320px;
}
.offline-icon{
  width:80px;
  height:80px;
  border-radius:50%;
  background:rgba(255,107,53,.1);
  border:2px solid rgba(255,107,53,.2);
  display:flex;
  align-items:center;
  justify-content:center;
}
.offline-icon svg{
  width:36px;
  height:36px;
  stroke:rgba(255,107,53,.8);
  fill:none;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.offline-logo{
  font-size:2rem;
  font-weight:800;
  letter-spacing:.04em;
}
.offline-logo span{
  color:#ff7a42;
}
.offline-title{
  font-size:1.1rem;
  font-weight:600;
  color:#b0b0c8;
  line-height:1.5;
}
.offline-desc{
  font-size:.85rem;
  color:#7a7a96;
  line-height:1.6;
}
.offline-btn{
  margin-top:.5rem;
  padding:.8rem 2rem;
  background:linear-gradient(135deg,#ff7a42,#ff8555);
  border:none;
  border-radius:12px;
  color:#fff;
  font-size:.9rem;
  font-weight:700;
  cursor:pointer;
  transition:all .2s;
  box-shadow:0 4px 16px rgba(255,107,53,.25);
  font-family:inherit;
}
.offline-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 24px rgba(255,107,53,.35);
}
.offline-btn:active{
  transform:translateY(0);
}
.offline-pulse{
  width:6px;
  height:6px;
  border-radius:50%;
  background:#ff7a42;
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{opacity:.3;transform:scale(1)}
  50%{opacity:1;transform:scale(1.5)}
}
</style>
</head>
<body>
<div class="offline-container">
  <div class="offline-icon">
    <svg viewBox="0 0 24 24">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>
  <div class="offline-logo">Touch<span>?</span></div>
  <div class="offline-title">Voce esta sem conexao</div>
  <div class="offline-desc">
    O Touch? precisa de internet para conectar pessoas.<br>
    Verifique sua rede e tente novamente.
  </div>
  <button class="offline-btn" onclick="window.location.reload()">Tentar novamente</button>
  <div class="offline-pulse"></div>
</div>
</body>
</html>
